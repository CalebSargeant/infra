apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - statefulset.yaml
  - service.yaml
components:
  - ../../../../_components/node-selectors/mini
patches:
  # Temporarily scale down Thanos Store to 0 to free resources
  - patch: |
      - op: replace
        path: /spec/replicas
        value: 0
    target:
      kind: StatefulSet
      labelSelector: "app.kubernetes.io/name=thanos-store"
