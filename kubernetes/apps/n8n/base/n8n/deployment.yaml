apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: automation
spec:
  replicas: 1
  # Single replica on a ReadWriteOnce volume. RollingUpdate would surge a
  # second pod before killing the old one, but a single node can't reliably
  # fit two n8n pods (now ~1Gi each) → new pod stuck Pending, old pod never
  # terminates, image bumps never roll out. Recreate terminates the old pod
  # first, freeing memory for the new.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      # fsGroup 1000 (node) makes the dynamic Longhorn volume writable by n8n's
      # non-root user — a fresh PV mounts root:root, unlike the old chowned
      # hostPath, so without this n8n CrashLoops on EACCES writing /home/node/.n8n.
      securityContext:
        fsGroup: 1000
      # n8n misparses the k8s-injected N8N_PORT=tcp://<svc-ip>:5678 service-link
      # env var; disable the Docker-style service links (n8n addresses by DNS).
      enableServiceLinks: false
      containers:
        - name: n8n
          image: n8nio/n8n:2.28.1 # {"$imagepolicy": "flux-system:n8n"}
          resources:
            # n8n 2.x outgrew the old 512Mi limit: under that cgroup V8 capped
            # its old-space heap at ~256Mi and OOM-crashed on startup ("Reached
            # heap limit" → CrashLoopBackOff, 2026-06). The DB backlog is tiny
            # (~15MB), so this is baseline growth, not runaway execution data.
            # Fix = 1Gi limit + NODE_OPTIONS=--max-old-space-size=768 (see env)
            # so V8 actually uses the headroom. ff-vm1 has ample free RAM. No CPU
            # limit (avoids false CFS-throttle alerts); request set to real usage.
            requests:
              memory: "512Mi"
              cpu: "50m"
            limits:
              memory: "1Gi"
          env:
            - name: DB_TYPE
              value: "postgresdb"
            - name: DB_POSTGRESDB_DATABASE
              value: "n8n"
            - name: DB_POSTGRESDB_HOST
              value: "postgres-rw.database.svc.cluster.local"
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_USER
              valueFrom:
                secretKeyRef:
                  name: n8n
                  key: postgres-username
            - name: DB_POSTGRESDB_SCHEMA
              value: "public"
            - name: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
              value: "false"
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  # Single source of truth: ExternalSecret n8n-db ← OCI Vault
                  # neondb-owner-password (the same value CNPG enforces on the
                  # neondb_owner role). The SOPS `n8n` secret's postgres-password
                  # key is now unused — kept only until it can be scrubbed.
                  name: n8n-db
                  key: password
            - name: N8N_BASIC_AUTH_ACTIVE
              value: "true"
            - name: N8N_BASIC_AUTH_USER
              value: "admin"
            - name: WEBHOOK_URL
              value: "https://n8n.magmamoose.com"
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n
                  key: encryption-key
            # Raise V8's heap ceiling to match the 1Gi limit above — without
            # this n8n OOM-crashes at the container-derived ~256Mi default.
            # (Old N8N_RUNNERS_ENABLED removed: task runners are GA/default-on
            # in 2.x and n8n logs the var as no longer needed.)
            - name: NODE_OPTIONS
              value: "--max-old-space-size=768"
          volumeMounts:
            - name: n8n
              mountPath: /home/node/.n8n
      volumes:
        - name: n8n
          persistentVolumeClaim:
            claimName: n8n
