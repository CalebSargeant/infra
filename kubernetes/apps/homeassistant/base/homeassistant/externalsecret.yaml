apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: homeassistant
  namespace: automation
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: homeassistant-recorder
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
      data:
        # Recorder connection string for the shared in-cluster CNPG, BUILT from the
        # single source of truth (OCI Vault neondb-owner-password — the same value CNPG
        # enforces on the neondb_owner role) so it can no longer drift from the role
        # password. That drift is exactly what silently broke HA's recorder after the
        # 2026-06-14 outage. Consumed as the RECORDER_DB_URL env var by the homeassistant
        # DaemonSet, which configuration.yaml reads via `!env_var RECORDER_DB_URL`.
        # (Replaces the standalone OCI Vault homeassistant-recorder-db-url secret, now
        # orphaned and safe to remove from the vault.)
        RECORDER_DB_URL: "postgresql://neondb_owner:{{ .password }}@postgres-rw.database.svc.cluster.local:5432/homeassistant?sslmode=require"
  data:
    - secretKey: password
      remoteRef:
        key: neondb-owner-password
