apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: automation
spec:
  replicas: 1
  # Single replica on a ReadWriteOnce hostPath volume, pinned to the Pi
  # (nodeSelector type:pi). RollingUpdate would surge a second pod before
  # killing the old one, but the Pi can't fit two n8n pods (320Mi each) →
  # new pod stuck Pending, old pod never terminates, image bumps never roll
  # out. Recreate terminates the old pod first, freeing memory for the new.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      containers:
        - name: n8n
          image: n8nio/n8n:2.26.3 # {"$imagepolicy": "flux-system:n8n"}
          resources:
            # KRR ~277Mi working set. Raw values (no resource-profile component,
            # which would have overridden these up to c.small's 512Mi). 320Mi
            # request with 512Mi limit for workflow-execution spikes. No CPU limit.
            requests:
              memory: "320Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
          env:
            - name: DB_TYPE
              value: "postgresdb"
            - name: DB_POSTGRESDB_DATABASE
              value: "n8n"
            - name: DB_POSTGRESDB_HOST
              value: "postgres-rw.database.svc.cluster.local"
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_USER
              valueFrom:
                secretKeyRef:
                  name: n8n
                  key: postgres-username
            - name: DB_POSTGRESDB_SCHEMA
              value: "public"
            - name: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
              value: "false"
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n
                  key: postgres-password
            - name: N8N_BASIC_AUTH_ACTIVE
              value: "true"
            - name: N8N_BASIC_AUTH_USER
              value: "admin"
            - name: WEBHOOK_URL
              value: "https://n8n.sargeant.co"
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n
                  key: encryption-key
            - name: N8N_RUNNERS_ENABLED
              value: "true"
          volumeMounts:
            - name: n8n
              mountPath: /home/node/.n8n
      volumes:
        - name: n8n
          persistentVolumeClaim:
            claimName: n8n
