apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: renovate
  namespace: automation
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: renovate
    creationPolicy: Owner
  data:
    # GitHub PAT (contents + pull-requests + workflows) Renovate opens update PRs
    # with. PREREQUISITE: create `renovate-github-token` in OCI Vault. The chart
    # mounts this secret's keys as env, so the key MUST be RENOVATE_TOKEN.
    - secretKey: RENOVATE_TOKEN
      remoteRef:
        key: renovate-github-token
