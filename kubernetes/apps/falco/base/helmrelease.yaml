apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  interval: 10m
  chart:
    spec:
      chart: falco
      version: "9.1.0"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
      interval: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # eBPF runtime threat detection. modern_ebpf needs no kernel headers.
    driver:
      kind: modern_ebpf
    # WORKER ONLY. The control-plane Pi runs a 16KB-page arm64 kernel where the
    # eBPF probe is unreliable — keep Falco off it (covers where apps run anyway).
    nodeSelector:
      node-role.kubernetes.io/worker: ""
    # Route alerts to Loki (forwarded best-effort; Falco still logs to stdout +
    # exposes Prometheus metrics if this endpoint is wrong). Ships a Grafana
    # dashboard. VERIFY the Loki push endpoint/namespace for your install.
    falcosidekick:
      enabled: true
      # The Falco DaemonSet is worker-pinned above, but the falcosidekick Deployment had
      # no nodeSelector and no resource request, so the scheduler placed it on the full
      # control-plane Pi, where a high Falco event rate ballooned it toward ~2Gi and the
      # node OOM-killed it repeatedly (23 restarts). Pin to worker, bound its memory, and
      # run a single replica (one alert forwarder is plenty for this cluster).
      replicaCount: 1
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          memory: 1Gi
      config:
        loki:
          hostport: "http://loki-gateway.observability.svc.cluster.local" # NOSONAR S5332 - in-cluster Loki push endpoint (east-west), not internet-facing
