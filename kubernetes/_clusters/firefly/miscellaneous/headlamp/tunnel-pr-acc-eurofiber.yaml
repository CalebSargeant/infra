apiVersion: apps/v1
kind: Deployment
metadata:
  name: pr-acc-eurofiber-apiserver-tunnel
  namespace: misc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pr-acc-eurofiber-apiserver-tunnel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pr-acc-eurofiber-apiserver-tunnel
    spec:
      containers:
        - name: tunnel
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -euo pipefail
              apk add --no-cache openssh-client sshpass
              mkdir -p /root/.ssh
              cp /ssh-auth/id_ed25519 /root/.ssh/id_ed25519
              cp /ssh-auth/id_ed25519-cert.pub /root/.ssh/id_ed25519-cert.pub
              chmod 600 /root/.ssh/id_ed25519 /root/.ssh/id_ed25519-cert.pub
              cat >/root/.ssh/config <<'EOF'
              Host pr-eurofiber
                HostName 172.24.24.52
                User locgov\\sargea50
                IdentityFile /root/.ssh/id_ed25519
                CertificateFile /root/.ssh/id_ed25519-cert.pub
                IdentitiesOnly yes
                PasswordAuthentication no
                StrictHostKeyChecking no
                UserKnownHostsFile /dev/null
              Host pr-acc-eurofiber
                HostName 10.150.112.10
                User emg_user
                ProxyJump pr-eurofiber
                PasswordAuthentication yes
                PreferredAuthentications password
                PubkeyAuthentication no
                StrictHostKeyChecking no
                UserKnownHostsFile /dev/null
              EOF
              exec sshpass -p "${VM_SSH_PASSWORD}" \
                ssh -F /root/.ssh/config -g -N \
                -L 0.0.0.0:6443:127.0.0.1:6443 \
                -o ExitOnForwardFailure=yes \
                -o ServerAliveInterval=30 \
                -o ServerAliveCountMax=3 \
                pr-acc-eurofiber
          env:
            - name: VM_SSH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pr-acc-eurofiber-apiserver-tunnel-ssh
                  key: vm_ssh_password
          ports:
            - containerPort: 6443
              name: https
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: ssh-auth
              mountPath: /ssh-auth
              readOnly: true
      volumes:
        - name: ssh-auth
          secret:
            secretName: pr-acc-eurofiber-apiserver-tunnel-ssh
            defaultMode: 0400
---
apiVersion: v1
kind: Service
metadata:
  name: headlamp-pr-acc-eurofiber-apiserver
  namespace: misc
spec:
  selector:
    app.kubernetes.io/name: pr-acc-eurofiber-apiserver-tunnel
  ports:
    - name: https
      port: 443
      targetPort: https
