  # See kubernetes/apps/openhands/README.md.
  # - ./openhands
  # backup
  - ./timemachine
  # miscellaneous (dashboard)
  - ./headlamp
  # media
  - ./bazarr
  - ./flaresolverr
  - ./jackett
  - ./nzbhydra2
  - ./overseerr
  - ./plex
  - ./prowlarr
  - ./qbittorrent
  - ./radarr
  - ./recyclarr
  - ./sabnzbd
  - ./sonarr
  - ./streaming-sync
  # miscellaneous
  - ./excalidraw
  - ./nextcloud
  - ./syncthing
  - ./wordpress
  # observability
  - ./alloy
  - ./blackbox-exporter
  - ./blackbox-exporter-oci
  - ./fluent-bit
  - ./holmesgpt
  - ./krr
  - ./kube-prometheus-stack
  - ./loki
  - ./thanos-compactor
  - ./thanos-query
  - ./thanos-store
  # delivery metrics (DORA)
  - ./devlake
  # platform (node-level tuning)
  - ./node-tuning
  # progressive delivery
  - ./flagger
  # identity (SSO)
  - ./authentik
  # security
  - ./defectdojo
  - ./dependency-track
  - ./falco
  - ./gatekeeper
  - ./kubescape
  - ./kyverno-policies
  - ./security-integrations
  - ./sonarqube
  - ./trivy-operator
  # developer portal
  - ./backstage
