---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prod-kyverno-policies
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps/kyverno-policies/base
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
  wait: true
