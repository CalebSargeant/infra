apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - configmap.enc.yaml
  - statefulset.yaml
  - service.yaml
components:
  - ../../../../_components/node-selectors/mini
patches:
  # Reduce Loki resources to fit mini nodes
  - patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1
            memory: 2Gi
    target:
      kind: StatefulSet
      labelSelector: "app.kubernetes.io/name=loki"
