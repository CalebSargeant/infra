apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sonarqube-monitoring
  namespace: security
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: sonarqube-monitoring
    creationPolicy: Owner
  data:
    # Probe passcode SonarQube requires to report readiness. PREREQUISITE: create
    # `sonarqube-monitoring-passcode` (any strong string) in OCI Vault before the
    # first reconcile — without it the pod never becomes ready.
    - secretKey: passcode
      remoteRef:
        key: sonarqube-monitoring-passcode
