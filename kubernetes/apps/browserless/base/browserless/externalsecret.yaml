apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: browserless
  namespace: automation
spec:
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: browserless
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # Shared auth token — clients pass it as ?token=<TOKEN> (or Authorization).
    - secretKey: token
      remoteRef:
        key: browserless-token
