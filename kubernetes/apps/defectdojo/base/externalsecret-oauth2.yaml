apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: oauth2-proxy
  namespace: security
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # Shared Google "Web application" OAuth client (also used by the
    # pr-dashboard proxy + Dependency-Track OIDC). client-id/secret are
    # user-provisioned; cookie-secret was generated into the vault.
    - secretKey: client-id
      remoteRef:
        key: google-sso-oauth-client-id
    - secretKey: client-secret
      remoteRef:
        key: google-sso-oauth-client-secret
    - secretKey: cookie-secret
      remoteRef:
        key: google-sso-cookie-secret
