# Cross-namespace RBAC in flux-system that lets the caldrith-namespace
# ServiceAccount `caldrith-ghcr-reader` read the SOPS-managed `ghcr-pull-secret`
# (which provably pulls ghcr.io/magmamoose/* — Flux's ImageRepository scans the
# caldrith image with it). Paired with the SecretStore + ExternalSecret in the
# caldrith repo's k8s/base/ghcr-pull-secret.yaml. Applied (with the rest of
# base/caldrith) by the prod-caldrith-source Flux Kustomization. Mirrors
# diatreme-pro's ghcr-reader-rbac.yaml.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: caldrith-ghcr-reader
  namespace: flux-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ghcr-pull-secret"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: caldrith-ghcr-reader
  namespace: flux-system
subjects:
  - kind: ServiceAccount
    name: caldrith-ghcr-reader
    namespace: caldrith
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: caldrith-ghcr-reader
