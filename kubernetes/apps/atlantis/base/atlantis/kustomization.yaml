apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - pvc.yaml
  - pv.yaml
  - configmap.yaml
  - serviceaccount.yaml
  - externalsecret.yaml
  # The Secret 'atlantis' is materialized by externalsecret.yaml from OCI
  # Vault keys: atlantis-github-app-id, atlantis-github-app-private-key,
  # atlantis-github-webhook-secret. See README.md for App creation steps.
  #
  # AWS / Azure credentials are still PAT-style if needed — uncomment the
  # SOPS files below (and create them) when you want Atlantis to drive
  # cloud-provider Terraform that requires those credentials.
  # - secret-aws.enc.yaml
  # - secret-azure.enc.yaml
components:
  - ../../../../_components/resource-profiles/c.medium
  - ../../../../_components/node-selectors/pi
