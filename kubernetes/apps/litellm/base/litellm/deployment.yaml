apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: automation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-stable
          imagePullPolicy: Always
          args:
            - "--config"
            - "/etc/litellm/config.yaml"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "4000"
          ports:
            - name: http
              containerPort: 4000
          env:
            # Subscription pass-through needs only the gateway master key; the
            # agent forwards its Claude OAuth token upstream. (For per-token API
            # billing, add ANTHROPIC_API_KEY / DEEPSEEK_API_KEY from the Secret.)
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm
                  key: master-key
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
              readOnly: true
          # /health/liveliness is LiteLLM's unauthenticated liveness endpoint.
          readinessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: litellm-config
