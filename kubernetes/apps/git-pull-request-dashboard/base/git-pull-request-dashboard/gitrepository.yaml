---
# Source for the external magmamoose/git-pull-request-dashboard repo (the
# dashboard manifests live there under ./k8s/overlays/prod, with image
# automation). magmamoose-org repo — uses the MagmaMoose-org App installation
# (see ../../../clusters/firefly/flux-system/github-app-magmamoose-secret.yaml),
# same as diatreme-pro / zoey.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: git-pull-request-dashboard
  namespace: flux-system
spec:
  interval: 10m
  provider: github
  ref:
    branch: main
  secretRef:
    name: github-app-magmamoose
  url: https://github.com/magmamoose/git-pull-request-dashboard
