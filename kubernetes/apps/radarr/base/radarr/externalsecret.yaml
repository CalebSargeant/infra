apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: radarr-db
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: radarr-db
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # neondb_owner DB password from the single source of truth
    # (OCI Vault neondb-owner-password) that CNPG also enforces on the role.
    # Injected into the deployment as RADARR__POSTGRES__PASSWORD, which overrides
    # the (now-inert) <PostgresPassword> in config.xml.
    - secretKey: password
      remoteRef:
        key: neondb-owner-password
