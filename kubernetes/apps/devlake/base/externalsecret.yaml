apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: devlake-encryption
  namespace: devlake
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: devlake-encryption
    creationPolicy: Owner
  data:
    # DevLake encrypts stored connector credentials with this key (the chart
    # requires it). PREREQUISITE: create `devlake-encryption-secret` in OCI Vault
    # once, e.g.  openssl rand -base64 2000 | tr -dc 'A-Z' | fold -w 128 | head -n 1
    # NEVER rotate it after data exists or stored connections become undecryptable.
    - secretKey: ENCRYPTION_SECRET # kics-scan ignore-line - ESO secretKey is a field name, not a hardcoded value
      remoteRef:
        key: devlake-encryption-secret
