apiVersion: apps/v1
kind: Deployment
metadata:
  name: jackett
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jackett
  template:
    metadata:
      labels:
        app: jackett
    spec:
      containers:
        - name: jackett
          image: linuxserver/jackett:0.24.2122 # {"$imagepolicy": "flux-system:jackett"}
          resources:
            # right-sized: observed ~93Mi; request leaves scheduling headroom, generous limit avoids OOM
            requests:
              memory: "192Mi"
              cpu: "10m"
            limits:
              memory: "320Mi"
          ports:
            - containerPort: 9117 # jackett web interface
          env:
            - name: PUID
              value: "1000" # Replace with your user ID
            - name: PGID
              value: "1000" # Replace with your group ID
            - name: TZ
              value: "Europe/Amsterdam" # Replace with your timezone
          volumeMounts:
            - mountPath: /config
              name: jackett
      volumes:
        - name: jackett
          persistentVolumeClaim:
            claimName: jackett
