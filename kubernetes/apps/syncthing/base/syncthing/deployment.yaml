apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncthing
  namespace: syncthing
spec:
  replicas: 1
  # Single replica on a ReadWriteOnce Longhorn volume — Recreate so the old pod
  # releases the PVC before the new one starts (RollingUpdate would surge a
  # second pod that can't attach the RWO volume and stay Pending).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: syncthing
  template:
    metadata:
      labels:
        app: syncthing
    spec:
      automountServiceAccountToken: false
      # fsGroup 1000 (PGID) makes the dynamic Longhorn volume writable by the
      # non-root syncthing process — a fresh PV mounts root:root, unlike the old
      # pre-chowned hostPath.
      securityContext:
        fsGroup: 1000
      containers:
        - name: syncthing
          image: syncthing/syncthing:1.28.1
          resources:
            requests:
              memory: "100Mi"
              cpu: "10m"
              ephemeral-storage: "1Gi"
            limits:
              memory: "100Mi"
              ephemeral-storage: "2Gi"
          ports:
            - containerPort: 8384
              name: web-ui
            - containerPort: 22000
              name: sync-tcp
            - containerPort: 22000
              protocol: UDP
              name: sync-udp
            - containerPort: 21027
              protocol: UDP
              name: discovery
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          volumeMounts:
            - name: syncthing-data
              mountPath: /var/syncthing
      volumes:
        - name: syncthing-data
          persistentVolumeClaim:
            claimName: syncthing-data
      restartPolicy: Always
