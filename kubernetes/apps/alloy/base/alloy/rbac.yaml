apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: observability
  labels:
    app.kubernetes.io/name: alloy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy-logs
  labels:
    app.kubernetes.io/name: alloy
rules:
  # loki.source.kubernetes reads pod logs via the Kubernetes API and discovers
  # pods/nodes to build per-node log targets.
  - apiGroups: [""]
    resources:
      - namespaces
      - nodes
      - nodes/proxy
      - pods
      - pods/log
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy-logs
  labels:
    app.kubernetes.io/name: alloy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy-logs
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: observability
