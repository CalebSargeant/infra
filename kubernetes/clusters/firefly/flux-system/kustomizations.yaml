# Phase E retirement: the 6 legacy category Kustomizations
# (automation/backup/media/misc/observability/security) — all now
# namespace-only after their apps migrated to apps/ — were retired and
# their namespaces consolidated into infrastructure-configs. The
# suspended core/database/cloudnative-pg Kustomizations from Phase C
# were also deleted (their content moved to infrastructure-controllers /
# -services). What remains: the external-repo Flux Kustomizations, plus
# the meta `apps` Kustomization that builds clusters/firefly/.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: buxfer-sync
  namespace: flux-system
  labels:
    app.kubernetes.io/sops: enabled
spec:
  interval: 10m
  path: ./k8s/overlays/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: buxfer-sync
    namespace: flux-system
  timeout: 5m
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-keys
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
 name: deskbird-booking
 namespace: flux-system
 labels:
   app.kubernetes.io/sops: enabled
spec:
 interval: 10m
 path: ./k8s/overlays/prod
 prune: true
 sourceRef:
   kind: GitRepository
   name: deskbird-booking
   namespace: flux-system
 timeout: 5m
 wait: true
 decryption:
   provider: sops
   secretRef:
     name: sops-keys
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: fortivpn-gateway
  namespace: flux-system
  labels:
    app.kubernetes.io/sops: enabled
spec:
  interval: 10m
  path: ./k8s/overlays/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: fortivpn-gateway
    namespace: flux-system
  timeout: 5m
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-keys
---
# Secrets come from OCI Vault (ExternalSecret) and 1Password Connect
# (OnePasswordItem); no SOPS-encrypted resources in this overlay.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: comment-commander
  namespace: flux-system
spec:
  interval: 10m
  path: ./k8s/overlays/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: comment-commander
    namespace: flux-system
  timeout: 5m
  wait: true
  dependsOn:
    - name: infrastructure-services
---
# comment-commander-pro — web dashboard / observability frontend for
# comment-commander. Secret (CC_TRIGGER_TOKEN) comes from OCI Vault via
# ExternalSecret; reads comment-commander's in-cluster Service. No SOPS.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: comment-commander-pro
  namespace: flux-system
spec:
  interval: 10m
  path: ./k8s/overlays/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: comment-commander-pro
    namespace: flux-system
  timeout: 5m
  wait: true
  dependsOn:
    - name: infrastructure-services
---
# diatreme-pro — Pro dashboard for Diatreme, at the apex diatreme.magmamoose.com.
# Supersedes comment-commander-pro. PROCESS_TRIGGER_SECRET comes from OCI Vault
# via ExternalSecret; talks to the Diatreme worker at api.diatreme.magmamoose.com
# (a Cloudflare Worker, not in-cluster). DNS for the apex is published by
# external-dns from this app's Ingress. No SOPS.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: diatreme-pro
  namespace: flux-system
spec:
  interval: 10m
  path: ./k8s/overlays/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: diatreme-pro
    namespace: flux-system
  timeout: 5m
  wait: true
  dependsOn:
    - name: infrastructure-services
---
# Zoey — DB secret is mirrored from CNPG's `postgres-app` and the ghcr pull
# secret is mirrored from flux-system, both via external-secrets' kubernetes
# provider. No SOPS-encrypted resources in this overlay.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: zoey
  namespace: flux-system
spec:
  interval: 10m
  path: ./k8s/overlays/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: zoey
    namespace: flux-system
  timeout: 5m
  wait: true
  dependsOn:
    - name: infrastructure-services
---
# OpenViking — context database backing Zoey's MCP server. Its manifests live
# in the zoey repo under ./k8s-openviking (same GitRepository as `zoey`, just
# a different path), kept as a separate Kustomization so the context DB
# reconciles independently of the Zoey app. Secrets (OpenAI key, server root
# API key) come from OCI Vault via ExternalSecret. No SOPS-encrypted resources.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openviking
  namespace: flux-system
spec:
  interval: 10m
  path: ./k8s-openviking
  prune: true
  sourceRef:
    kind: GitRepository
    name: zoey
    namespace: flux-system
  timeout: 5m
  wait: true
  dependsOn:
    - name: infrastructure-services
---
# Meta Kustomization — builds kubernetes/clusters/firefly/, which renders the
# per-app (apps/<app>/prod/<app>/flux-kustomization.yaml) and per-tier
# (infrastructure/{configs,controllers,services}/flux-kustomization.yaml)
# Flux Kustomization CRs. No app/tier resources cross this Kustomization
# itself — those are applied by each emitted Flux Kustomization.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/clusters/firefly
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
