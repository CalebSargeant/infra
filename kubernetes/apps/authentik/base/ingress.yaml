---
# Authentik IS the identity provider, so it carries its own auth — exposed
# publicly (no oauth2-proxy/Access in front). external-dns publishes the CNAME +
# cert-manager mints the cert; the cloudflared tunnel routes to the Service.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authentik
  namespace: authentik
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-dns
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/target: 7694eb38-c35e-4905-bd2b-16ab7053080a.cfargotunnel.com
    traefik.ingress.kubernetes.io/service.serversscheme: http
    traefik.ingress.kubernetes.io/entrypoints: websecure
  labels:
    app: authentik
spec:
  rules:
    - host: authentik.magmamoose.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authentik-server
                port:
                  number: 80
  tls:
    - hosts:
        - authentik.magmamoose.com
      secretName: authentik-tls
