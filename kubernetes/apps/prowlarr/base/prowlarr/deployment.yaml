apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      containers:
        - name: prowlarr
          image: linuxserver/prowlarr:2.4.0 # {"$imagepolicy": "flux-system:prowlarr"}
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "100Mi"
              cpu: "11m"
            limits:
              memory: "100Mi"
          ports:
            - containerPort: 9696 # Prowlarr web interface
          env:
            - name: PUID
              value: "1000" # Replace with your user ID
            - name: PGID
              value: "1000" # Replace with your group ID
            - name: TZ
              value: "Europe/Amsterdam" # Replace with your timezone
            # neondb_owner DB password from the single source of truth (ExternalSecret
            # prowlarr-db ← OCI Vault neondb-owner-password, also enforced on the role by
            # CNPG). This env overrides <PostgresPassword> in config.xml, so the password
            # lives in exactly one place and can't drift.
            - name: PROWLARR__POSTGRES__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: prowlarr-db
                  key: password
          volumeMounts:
            - mountPath: /config
              name: prowlarr
            - mountPath: /config/config.xml
              name: prowlarr-config
              subPath: config.xml
      volumes:
        - name: prowlarr
          persistentVolumeClaim:
            claimName: prowlarr
        - name: prowlarr-config
          configMap:
            name: prowlarr-config
