apiVersion: apps/v1
kind: Deployment
metadata:
  name: sabnzbd
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sabnzbd
  template:
    metadata:
      labels:
        app: sabnzbd
    spec:
      automountServiceAccountToken: false
      containers:
        - name: sabnzbd
          image: linuxserver/sabnzbd:4.5.5 # {"$imagepolicy": "flux-system:sabnzbd"}
          ports:
            - containerPort: 8080
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Amsterdam"
          volumeMounts:
            - mountPath: /config
              name: sabnzbd-config
            - mountPath: /downloads
              name: downloads
          resources:
            requests:
              # right-sized: observed ~118Mi usage; 256Mi frees scheduling headroom
              memory: "256Mi"
              cpu: "200m"
              ephemeral-storage: "1Gi"
            limits:
              # generous on purpose so we never OOM; limits don't affect scheduling
              memory: "512Mi"
              cpu: "750m"
              ephemeral-storage: "4Gi"
      volumes:
        - name: sabnzbd-config
          persistentVolumeClaim:
            claimName: sabnzbd-config
        - name: downloads
          persistentVolumeClaim:
            claimName: downloads
