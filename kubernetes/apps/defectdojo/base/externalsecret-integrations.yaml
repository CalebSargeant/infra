apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  # Slack token for the `dd-bootstrap` init container (helmrelease.yaml) — wires
  # up DefectDojo's Slack notifications, which the chart can't configure. (GitHub
  # issue push is handled by the dt-defectdojo-sync CronJob, not DefectDojo, so no
  # GitHub PAT is needed here.)
  name: defectdojo-integrations
  namespace: security
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: defectdojo-integrations
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # Reuse the cluster-wide Slack bot token (same one Alertmanager + Flux use).
    # The bot must be a member of the target channel (#engineering-alerts).
    - secretKey: SLACK_TOKEN
      remoteRef:
        key: slack-bot-token
