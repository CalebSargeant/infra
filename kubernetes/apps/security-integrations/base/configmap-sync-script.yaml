apiVersion: v1
kind: ConfigMap
metadata:
  # Mounted at /scripts in the dt-defectdojo-sync CronJob (defectdojo image).
  name: dt-defectdojo-sync
  namespace: security
data:
  sync.py: |
    #!/usr/bin/env python3
    """Dependency-Track -> DefectDojo sync, with zero-touch GitHub issue auto-push.

    Runs in the DefectDojo django image (Django ORM + requests + PyGithub present).
    For every Dependency-Track project it:
      1. exports findings in FPF and reimport-scans them into DefectDojo via the
         stable REST API (auto_create_context creates product/engagement/test,
         dedups on re-runs),
      2. resolves a GitHub repo for the project BY NAME across the configured
         targets (github.com first, then any GitHub Enterprise server) and opens
         issues for new Active findings at/above a severity floor — recording a
         GITHUB_Issue per finding so re-runs dedupe and DefectDojo links the issue.

    Zero-touch: there is NO per-repo config. GitHub *accounts* (server + owners +
    token) are listed once in the OCI Vault key `github-issue-targets`; a DTrack
    project maps to a repo of the same name under those owners. No repo names or
    enterprise hostnames live in git; reproduce by restoring that one vault key.

    Idempotent + safe to re-run hourly. Per-project errors are logged and skipped;
    the job only fails hard on setup errors (no token / DTrack unreachable).
    """
    import json
    import logging
    import os
    import sys

    logging.basicConfig(level=logging.INFO, format="dt-sync: %(message)s")
    log = logging.getLogger("dt-sync")

    os.environ.setdefault("DJANGO_SETTINGS_MODULE", "dojo.settings.settings")

    import django  # noqa: E402

    django.setup()

    import requests  # noqa: E402

    DD_URL = os.environ.get("DEFECTDOJO_URL", "http://defectdojo-django.security.svc.cluster.local").rstrip("/")
    DT_URL = os.environ.get("DTRACK_API_URL", "http://dependency-track-api-server.security.svc.cluster.local:8080").rstrip("/")
    DT_KEY = os.environ.get("DTRACK_API_KEY", "").strip()
    PRODUCT_TYPE = os.environ.get("DD_PRODUCT_TYPE", "Dependency-Track")
    ENGAGEMENT = os.environ.get("DD_ENGAGEMENT", "Dependency Track")
    SITE_URL = os.environ.get("DD_SITE_URL", "https://defectdojo.magmamoose.com").rstrip("/")
    MIN_SEVERITY = os.environ.get("GITHUB_MIN_SEVERITY", "High")
    MAX_ISSUES = int(os.environ.get("MAX_GITHUB_ISSUES_PER_RUN", "50"))
    HTTP_TIMEOUT = int(os.environ.get("HTTP_TIMEOUT", "300"))
    GITHUB_TARGETS = os.environ.get("GITHUB_TARGETS", "").strip()

    SEV_RANK = {"Critical": 4, "High": 3, "Medium": 2, "Low": 1, "Info": 0}
    SEV_FLOOR = SEV_RANK.get(MIN_SEVERITY, 3)


    def build_targets():
        """Parse github-issue-targets JSON -> [{client, owners, api_url}] (order preserved)."""
        if not GITHUB_TARGETS:
            log.info("no GITHUB_TARGETS configured; GitHub issue push disabled")
            return []
        try:
            raw = json.loads(GITHUB_TARGETS)
        except ValueError as exc:
            log.warning("GITHUB_TARGETS is not valid JSON (%s); GitHub disabled", exc)
            return []
        from github import Auth, Github
        out = []
        for entry in raw:
            api = (entry.get("api_url") or "https://api.github.com").rstrip("/")
            owners = entry.get("owners") or []
            token = entry.get("token") or ""
            if not owners or not token:
                log.warning("skipping github target with missing owners/token: %s", api)
                continue
            out.append({"client": Github(base_url=api, auth=Auth.Token(token)), "owners": owners, "api_url": api})
        log.info("loaded %d github target(s)", len(out))
        return out


    def resolve_repo(project_name, targets):
        """Find a repo named project_name under the configured owners (github.com first)."""
        from github import GithubException
        for tgt in targets:
            for owner in tgt["owners"]:
                try:
                    repo = tgt["client"].get_repo(f"{owner}/{project_name}")
                    log.info("[%s] resolved -> %s", project_name, repo.full_name)
                    return repo
                except GithubException:
                    continue
        log.info("[%s] no matching repo under configured owners; skipping GitHub", project_name)
        return None


    def dd_token():
        """Mint/fetch an API token for a superuser via the ORM (no password needed)."""
        from rest_framework.authtoken.models import Token

        from dojo.models import Dojo_User
        admin = Dojo_User.objects.filter(is_superuser=True, is_active=True).order_by("id").first()
        if not admin:
            raise RuntimeError("no active superuser found to mint a DefectDojo token")
        token, _ = Token.objects.get_or_create(user=admin)
        return token.key


    def dt_projects():
        out, page, size = [], 1, 100
        while True:
            resp = requests.get(
                f"{DT_URL}/api/v1/project",
                headers={"X-Api-Key": DT_KEY, "Accept": "application/json"},
                params={"excludeInactive": "true", "pageSize": size, "pageNumber": page},
                timeout=HTTP_TIMEOUT,
            )
            resp.raise_for_status()
            batch = resp.json()
            out.extend(batch)
            if len(batch) < size:
                break
            page += 1
        return out


    def dt_export_fpf(uuid):
        resp = requests.get(
            f"{DT_URL}/api/v1/finding/project/{uuid}/export",
            headers={"X-Api-Key": DT_KEY, "Accept": "application/json"},
            timeout=HTTP_TIMEOUT,
        )
        resp.raise_for_status()
        return resp.content


    def dd_reimport(token, product_name, fpf_bytes):
        data = {
            "scan_type": "Dependency Track Finding Packaging Format (FPF) Export",
            "product_type_name": PRODUCT_TYPE,
            "product_name": product_name,
            "engagement_name": ENGAGEMENT,
            "auto_create_context": "true",
            "active": "true",
            "close_old_findings": "true",
            "minimum_severity": "Info",
        }
        files = {"file": ("findings.json", fpf_bytes, "application/json")}
        resp = requests.post(
            f"{DD_URL}/api/v2/reimport-scan/",
            headers={"Authorization": f"Token {token}"},
            data=data,
            files=files,
            timeout=HTTP_TIMEOUT,
        )
        resp.raise_for_status()
        return resp.json()


    def issue_body(find):
        parts = [f"**Severity:** {find.severity}"]
        comp = " ".join(p for p in [getattr(find, "component_name", None), getattr(find, "component_version", None)] if p)
        if comp:
            parts.append(f"**Component:** {comp}")
        try:
            vulns = ", ".join(find.vulnerability_ids.values_list("vulnerability_id", flat=True))
        except Exception:  # noqa: BLE001
            vulns = getattr(find, "cve", None) or ""
        if vulns:
            parts.append(f"**Vulnerability:** {vulns}")
        parts.append("")
        parts.append((find.description or "").strip()[:4000])
        parts.append("")
        parts.append(f"_Imported from Dependency-Track via [DefectDojo]({SITE_URL}/finding/{find.id})._")
        return "\n".join(parts)


    def push_issues(project_name, repo, issue_budget):
        """Open GitHub issues for new Active findings at/above the severity floor."""
        from dojo.github.models import GITHUB_Issue
        from dojo.models import Finding
        created = 0
        findings = Finding.objects.filter(test__engagement__product__name=project_name, active=True)
        for find in findings:
            if SEV_RANK.get(find.severity, 0) < SEV_FLOOR:
                continue
            if GITHUB_Issue.objects.filter(finding=find).exists():
                continue
            if created >= issue_budget:
                log.warning("[%s] hit per-run issue budget (%d); rest deferred to next run", project_name, MAX_ISSUES)
                break
            try:
                issue = repo.create_issue(
                    title=f"[{find.severity}] {find.title}"[:250],
                    body=issue_body(find),
                    labels=["defectdojo", f"severity:{find.severity.lower()}"],
                )
                GITHUB_Issue.objects.create(issue_id=str(issue.number), issue_url=issue.html_url, finding=find)
                created += 1
            except Exception:  # noqa: BLE001
                log.exception("[%s] failed to open issue for finding %s", project_name, find.id)
        if created:
            log.info("[%s] opened %d issue(s) on %s", project_name, created, repo.full_name)
        return created


    def main():
        if not DT_KEY:
            log.error("DTRACK_API_KEY is empty; aborting")
            return 1
        targets = build_targets()
        token = dd_token()

        try:
            projects = dt_projects()
        except requests.RequestException:
            log.exception("failed to list Dependency-Track projects; aborting")
            return 1
        log.info("found %d active Dependency-Track project(s)", len(projects))

        ok = skipped = issues = 0
        pushed_products = set()  # multi-version projects share one DefectDojo product
        for proj in projects:
            name, uuid = proj.get("name"), proj.get("uuid")
            version = proj.get("version")
            label = f"{name} ({version})" if version else name
            if not name or not uuid:
                continue
            try:
                dd_reimport(token, name, dt_export_fpf(uuid))
                log.info("[%s] imported into DefectDojo", label)
                if targets and name not in pushed_products and (MAX_ISSUES - issues) > 0:
                    pushed_products.add(name)
                    repo = resolve_repo(name, targets)
                    if repo is not None:
                        issues += push_issues(name, repo, MAX_ISSUES - issues)
                ok += 1
            except Exception:  # noqa: BLE001
                log.exception("[%s] sync failed; skipping", label)
                skipped += 1

        log.info("done: %d synced, %d skipped, %d github issue(s) created", ok, skipped, issues)
        return 0


    if __name__ == "__main__":
        sys.exit(main())
