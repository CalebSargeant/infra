apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  namespace: database
spec:
  serviceName: mariadb
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.2
          resources:
            # m.pico resource-profile reserved 512Mi req / 1Gi limit (plus a 250m
            # CPU limit) but MariaDB idles ~82Mi on ff-pi1 (WordPress is the only
            # consumer and is itself tiny). Explicit inline sizing per repo
            # convention: 192Mi request frees ~320Mi of the Pi's memory-request
            # pressure, while a 512Mi limit keeps generous burst room for the DB.
            # CPU request only — no CPU limit (avoids false CFS-throttle alerts).
            requests:
              memory: "192Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb
                  key: mariadb-root-password
            - name: MYSQL_DATABASE
              value: "wordpress"
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mariadb
                  key: wordpress-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb
                  key: wordpress-password
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
              # subPath prevents MariaDB from using the volume root,
              # avoiding issues with lost+found and other metadata
              subPath: mysql
      volumes:
        - name: mariadb-data
          persistentVolumeClaim:
            claimName: mariadb
