apiVersion: apps/v1
kind: Deployment
metadata:
  name: pr-acc-eurofiber-web-tunnel
  namespace: misc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pr-acc-eurofiber-web-tunnel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pr-acc-eurofiber-web-tunnel
    spec:
      containers:
        - name: tunnel
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -euo pipefail
              apk add --no-cache kubectl nginx

              cat >/etc/nginx/http.d/default.conf <<'EOF'
              map $http_upgrade $connection_upgrade {
                default upgrade;
                '' close;
              }

              server {
                listen 8080 default_server;
                return 404;
              }

              server {
                listen 8080;
                server_name test-management.tst.samenleving.org;
                location / { proxy_pass http://127.0.0.1:18080; include /etc/nginx/proxy_params; }
              }

              server {
                listen 8080;
                server_name test-management.samenleving.org;
                location / { proxy_pass http://127.0.0.1:18081; include /etc/nginx/proxy_params; }
              }

              server {
                listen 8080;
                server_name time.tst.samenleving.org;
                location / { proxy_pass http://127.0.0.1:18082; include /etc/nginx/proxy_params; }
              }

              server {
                listen 8080;
                server_name time.samenleving.org;
                location / { proxy_pass http://127.0.0.1:18083; include /etc/nginx/proxy_params; }
              }

              server {
                listen 8080;
                server_name processmanager.dev.samenleving.org;
                location / { proxy_pass http://127.0.0.1:18084; include /etc/nginx/proxy_params; }
              }

              server {
                listen 8080;
                server_name iadministratie.iadmin.dev.samenleving.org;
                location / { proxy_pass http://127.0.0.1:18085; include /etc/nginx/proxy_params; }
              }

              server {
                listen 8080;
                server_name igateway.iadmin.dev.samenleving.org;
                location / { proxy_pass http://127.0.0.1:18086; include /etc/nginx/proxy_params; }
              }

              server {
                listen 8080;
                server_name keycloak.samenleving.org;
                location / { proxy_pass http://127.0.0.1:18087; include /etc/nginx/proxy_params; }
              }

              EOF

              cat >/etc/nginx/proxy_params <<'EOF'
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Host $host;
              proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection $connection_upgrade;
              proxy_read_timeout 300s;
              proxy_send_timeout 300s;
              EOF

              pf() {
                local namespace="$1"
                local service="$2"
                local local_port="$3"
                local remote_port="$4"
                local log_file="/tmp/port-forward-${namespace}-${service}.log"
                while true; do
                  kubectl --kubeconfig=/kubeconfigs/config --context=pr-acc-eurofiber \
                    -n "${namespace}" port-forward "svc/${service}" "${local_port}:${remote_port}" \
                    --address 127.0.0.1 >>"${log_file}" 2>&1 || true
                  sleep 2
                done &
              }

              pf tst-test-management test-management-service 18080 8080
              pf prod-test-management test-management-service 18081 8080
              pf tst-github-time-logger github-time-logger-service 18082 8080
              pf prod-github-time-logger github-time-logger-service 18083 8080
              pf dev-iadmin-processmanager iadmin-processmanager-service 18084 8080
              pf dev-iadmin-iadministratie iadmin-iadministratie-service 18085 8080
              pf dev-iadmin-igateway iadmin-igateway-service 18086 8080
              pf nonprod-keycloak keycloak 18087 80

              exec nginx -g 'daemon off;'
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: kubeconfigs
              mountPath: /kubeconfigs
              readOnly: true
      volumes:
        - name: kubeconfigs
          secret:
            secretName: headlamp-kubeconfigs
---
apiVersion: v1
kind: Service
metadata:
  name: pr-acc-eurofiber-web-tunnel
  namespace: misc
spec:
  selector:
    app.kubernetes.io/name: pr-acc-eurofiber-web-tunnel
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pr-acc-eurofiber-web-tunnel
  namespace: misc
spec:
  ingressClassName: traefik
  rules:
    - host: test-management.tst.samenleving.org
      http: &httpBackend
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pr-acc-eurofiber-web-tunnel
                port:
                  number: 80
    - host: test-management.samenleving.org
      http: *httpBackend
    - host: time.tst.samenleving.org
      http: *httpBackend
    - host: time.samenleving.org
      http: *httpBackend
    - host: processmanager.dev.samenleving.org
      http: *httpBackend
    - host: iadministratie.iadmin.dev.samenleving.org
      http: *httpBackend
    - host: igateway.iadmin.dev.samenleving.org
      http: *httpBackend
    - host: keycloak.samenleving.org
      http: *httpBackend
  tls:
    - hosts:
        - test-management.tst.samenleving.org
        - test-management.samenleving.org
        - time.tst.samenleving.org
        - time.samenleving.org
        - processmanager.dev.samenleving.org
        - iadministratie.iadmin.dev.samenleving.org
        - igateway.iadmin.dev.samenleving.org
        - keycloak.samenleving.org
