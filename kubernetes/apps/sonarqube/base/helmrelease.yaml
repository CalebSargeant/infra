apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarqube
  namespace: security
spec:
  interval: 10m
  chart:
    spec:
      chart: sonarqube
      version: "2026.3.1"
      sourceRef:
        kind: HelmRepository
        name: sonarqube
        namespace: flux-system
      interval: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Free SonarQube Community Build (no commercial licence).
    community:
      enabled: true

    # Pin to the on-prem worker (ff-vm1). The chart isn't app-template, so the
    # node-selectors/worker-on-prem component's defaultPodOptions patch wouldn't
    # apply — set nodeSelector directly.
    nodeSelector:
      node-role.kubernetes.io/worker: ""
      topology.sargeant.co/tier: on-prem

    # Embedded Elasticsearch needs vm.max_map_count=524288; the chart's
    # privileged init container sets it (default-on, restated for clarity).
    initSysctl:
      enabled: true
      vmMaxMapCount: 524288

    # External database = the shared CloudNativePG cluster. This chart has no
    # bundled Postgres to disable.
    jdbcOverwrite:
      enabled: true
      jdbcUrl: "jdbc:postgresql://postgres-rw.database.svc.cluster.local:5432/sonarqube"
      jdbcUsername: "neondb_owner"
      jdbcSecretName: "sonarqube-db"
      jdbcSecretPasswordKey: "password"

    # Required for probes — loaded from OCI Vault via externalsecret-monitoring.yaml.
    monitoringPasscodeSecretName: "sonarqube-monitoring"
    monitoringPasscodeSecretKey: "passcode"

    # Plugins/extensions + ES indexes — movable Longhorn volume.
    persistence:
      enabled: true
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 5Gi

    service:
      externalPort: 9000

    # Routing is the cloudflared tunnel (see ingress.yaml + tunnels.tf); keep the
    # chart Ingress off.
    ingress:
      enabled: false

    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        memory: 6Gi
