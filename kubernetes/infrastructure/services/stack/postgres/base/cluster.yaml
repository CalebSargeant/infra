---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: database
spec:
  instances: 3
  
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
      maintenance_work_mem: "64MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      work_mem: "1310kB"
      huge_pages: "off"
      min_wal_size: "1GB"
      max_wal_size: "4GB"
  
  storage:
    size: 10Gi
    storageClass: local-path
  
  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: postgres-app-user
  
  monitoring:
    enablePodMonitor: true

  managed:
    # Only the `admin` role is declared here, so CNPG reconciles ONLY it and leaves
    # every other role (postgres, app, neondb_owner, litellm, ...) untouched.
    # `admin` is a superuser used exclusively by nextcloud; its password is sourced
    # from the basic-auth secret nextcloud-db-admin (ExternalSecret → OCI Vault
    # nextcloud-db-admin-password) rather than being set by hand on the primary.
    roles:
      - name: admin
        ensure: present
        login: true
        superuser: true
        passwordSecret:
          name: nextcloud-db-admin

  backup:
    barmanObjectStore:
      destinationPath: s3://postgres-backups/
      # OCI Object Storage (S3-compat) — offsite, survives cluster loss (unlike in-cluster MinIO).
      # Creds via ExternalSecret postgres-backup-oci (from OCI Vault backup-oci-s3-credentials).
      endpointURL: https://axn3gwpaabzc.compat.objectstorage.eu-amsterdam-1.oraclecloud.com
      s3Credentials:
        accessKeyId:
          name: postgres-backup-oci
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: postgres-backup-oci
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 2
    retentionPolicy: "30d"
