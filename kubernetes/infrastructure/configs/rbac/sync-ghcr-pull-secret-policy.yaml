---
# Clones ghcr-pull-secret from flux-system into any Namespace labelled
# `ghcr-pull-secret: sync`. Kyverno keeps the copies in sync with the
# source; deleting a label removes the generated Secret.
#
# generateExisting: true backfills namespaces that already carry the label
# when the policy is first applied.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: sync-ghcr-pull-secret
spec:
  generateExisting: true
  background: true
  rules:
    - name: clone
      match:
        any:
          - resources:
              kinds:
                - Namespace
              selector:
                matchLabels:
                  ghcr-pull-secret: sync
      generate:
        apiVersion: v1
        kind: Secret
        name: ghcr-pull-secret
        namespace: "{{request.object.metadata.name}}"
        synchronize: true
        clone:
          namespace: flux-system
          name: ghcr-pull-secret
