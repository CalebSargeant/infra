apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: neondb-owner
  namespace: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: neondb-owner
    creationPolicy: Owner
    template:
      # basic-auth: consumed by the CNPG Cluster `spec.managed.roles` passwordSecret
      # for the shared `neondb_owner` LOGIN role (n8n, homeassistant, sonarr, radarr,
      # prowlarr). CNPG continuously reconciles the role password from this secret, so
      # a manual `ALTER ROLE` can no longer silently drift it (the 2026-06-14 outage).
      # Single source of truth: OCI Vault neondb-owner-password.
      type: kubernetes.io/basic-auth
      engineVersion: v2
      data:
        username: neondb_owner
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: neondb-owner-password
