---
# Exists only so external-dns publishes the CNAME (the `target` annotation) and
# cert-manager mints the cert. Actual request routing is the cloudflared tunnel
# (terraform/cloudflare/zero-trust/prod/tunnels.tf), which connects straight to
# the Service and bypasses Traefik. Host on magmamoose.com (the dev-tooling
# convention; note magmamoose.com is on Tucows clientHold until that lifts).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backstage
  namespace: core
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-dns
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/target: 7694eb38-c35e-4905-bd2b-16ab7053080a.cfargotunnel.com
    traefik.ingress.kubernetes.io/service.serversscheme: http
    traefik.ingress.kubernetes.io/entrypoints: websecure
  labels:
    app: backstage
spec:
  rules:
    - host: backstage.magmamoose.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # RHDH chart names the Service <release>-developer-hub.
                name: backstage-developer-hub
                port:
                  number: 7007
  tls:
    - hosts:
        - backstage.magmamoose.com
      secretName: backstage-tls
