apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlantis
  namespace: automation
  labels:
    app: atlantis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atlantis
  template:
    metadata:
      labels:
        app: atlantis
    spec:
      serviceAccountName: atlantis
      securityContext:
        # Atlantis upstream image uses UID 100 / GID 1000 for the atlantis user.
        # Be explicit so a kubelet that ignores image USER doesn't fall back to root.
        runAsUser: 100
        runAsGroup: 1000
        fsGroup: 1000
        # The PVC was first mounted long ago with different ownership; force k8s
        # to recursively chgrp the volume root on each pod start until it matches.
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        # The existing PVC has files owned by old UIDs (created before this
        # securityContext was set). fsGroup chgrp's but doesn't chown the existing
        # files — atlantis still can't *create* new entries because the dir itself
        # is owned by an alien user. This init container repairs ownership on
        # first run and is a no-op on every subsequent pod start: it stat's the
        # volume root and only walks the tree if owner != 100:1000.
        - name: fix-data-ownership
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              OWNER=$(stat -c '%u:%g' /atlantis-data)
              if [ "$OWNER" = "100:1000" ]; then
                echo "ownership already correct ($OWNER), skipping chown"
                exit 0
              fi
              echo "current owner $OWNER != 100:1000, repairing..."
              chown -R 100:1000 /atlantis-data
              chmod -R u+rwX,g+rwX /atlantis-data
              echo "done"
          securityContext:
            runAsUser: 0          # need root to chown
            runAsGroup: 0
            runAsNonRoot: false
          volumeMounts:
            - name: atlantis-data
              mountPath: /atlantis-data
      containers:
        - name: atlantis
          image: ghcr.io/runatlantis/atlantis:v0.31.0
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          env:
            - name: ATLANTIS_REPO_ALLOWLIST
              value: "github.com/CalebSargeant/infra"
            # GitHub App auth (replaces ATLANTIS_GH_USER/_TOKEN PAT flow).
            # The App ID and PEM key come from the Secret 'atlantis' which is
            # materialized by externalsecret.yaml pulling from OCI Vault.
            - name: ATLANTIS_GH_APP_ID
              valueFrom:
                secretKeyRef:
                  name: atlantis
                  key: app-id
            - name: ATLANTIS_GH_APP_KEY_FILE
              value: /etc/atlantis/github-app/private-key.pem
            - name: ATLANTIS_GH_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: atlantis
                  key: webhook-secret
            - name: ATLANTIS_PORT
              value: "4141"
            - name: ATLANTIS_ATLANTIS_URL
              value: "https://atlantis.sargeant.co"
            - name: ATLANTIS_DATA_DIR
              value: "/atlantis-data"
            - name: ATLANTIS_REPO_CONFIG_JSON
              valueFrom:
                configMapKeyRef:
                  name: atlantis-config
                  key: repos.json
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: atlantis-aws
                  key: access-key-id
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: atlantis-aws
                  key: secret-access-key
                  optional: true
            - name: AWS_REGION
              value: "us-east-1"
            - name: ARM_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: atlantis-azure
                  key: client-id
                  optional: true
            - name: ARM_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: atlantis-azure
                  key: client-secret
                  optional: true
            - name: ARM_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: atlantis-azure
                  key: tenant-id
                  optional: true
            - name: ARM_SUBSCRIPTION_ID
              valueFrom:
                secretKeyRef:
                  name: atlantis-azure
                  key: subscription-id
                  optional: true
          ports:
            - name: atlantis
              containerPort: 4141
          volumeMounts:
            - name: atlantis-data
              mountPath: /atlantis-data
            - name: github-app-key
              mountPath: /etc/atlantis/github-app
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4141
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4141
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: atlantis-data
          persistentVolumeClaim:
            claimName: atlantis
        - name: github-app-key
          secret:
            secretName: atlantis
            items:
              - key: app-key-pem
                path: private-key.pem
            # 0440 (group-readable) so the atlantis container user can read it
            # via fsGroup: 1000 (set at the pod securityContext). Not 0400 —
            # that's owner-only and the container runs non-root.
            defaultMode: 0440
