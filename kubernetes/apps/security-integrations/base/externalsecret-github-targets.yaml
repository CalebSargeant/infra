apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  # GitHub "accounts" the sync searches to auto-resolve a repo for each DTrack
  # project (by matching project name -> repo name under the listed owners).
  # The whole config — servers, owners, AND tokens — lives in ONE OCI Vault key
  # so no repo names / enterprise hostnames ever land in this public repo, and
  # the system is reproducible by restoring that single key.
  #
  # OCI Vault key `github-issue-targets` = a JSON array, github.com first:
  #   [
  #     {"api_url":"https://api.github.com","owners":["<user-or-org>"],"token":"<github.com PAT>"},
  #     {"api_url":"https://<host>.ghe.com/api/v3","owners":["<org>"],"token":"<GHE PAT>"}
  #   ]
  # PATs: fine-grained, Issues read/write + Metadata read. Scope to "all repos"
  # for true zero-touch (new repos auto-covered), or list specific repos.
  name: github-issue-targets
  namespace: security
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: github-issue-targets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: GITHUB_TARGETS
      remoteRef:
        key: github-issue-targets
