apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: defectdojo
  namespace: security
spec:
  interval: 10m
  chart:
    spec:
      chart: defectdojo
      version: "1.9.29" # appVersion 2.58.4
      sourceRef:
        kind: HelmRepository
        name: defectdojo
        namespace: flux-system
      interval: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # ── Site / hosting ──────────────────────────────────────────────────────
    host: defectdojo.magmamoose.com
    siteUrl: "https://defectdojo.magmamoose.com"
    # 3 components pull the same large django image — avoid re-pulls.
    imagePullPolicy: IfNotPresent

    # ── External database: shared CloudNativePG (no bundled postgres) ─────────
    postgresql:
      enabled: false
      auth:
        database: defectdojo
        username: neondb_owner
        existingSecret: defectdojo-postgresql-specific
        secretKeys:
          userPasswordKey: postgresql-password
    # Top-level key consumed by the chart's postgresql.hostname helper when the
    # bundled subchart is disabled (DD_DATABASE_HOST). Port stays 5432.
    postgresServer: postgres-rw.database.svc.cluster.local

    # ── Celery broker: SHARED in-cluster Valkey ──────────────────────────────
    # Use the consolidated broker tier (infrastructure/services/stack/valkey,
    # database ns) instead of a bundled per-app Valkey — same rationale as the
    # shared CNPG postgres. Authless internal ClusterIP; DefectDojo builds the
    # broker URL redis://<redisServer>:<redisPort> from these top-level keys.
    valkey:
      enabled: false
    redisServer: valkey.database.svc.cluster.local
    redisScheme: redis
    redisPort: 6379
    # App + DB secrets are externally managed (ExternalSecret → OCI Vault).
    createSecret: false
    createPostgresqlSecret: false

    # ── Workload pinning + tuned-down resources (worker = ff-vm1) ─────────────
    django:
      replicas: 1
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      # We manage ingress ourselves (ingress.yaml: both .co + .local hosts).
      ingress:
        enabled: false
      mediaPersistentVolume:
        enabled: true
        type: pvc
        persistentVolumeClaim:
          create: true
          size: 5Gi
          accessModes:
            - ReadWriteOnce
          storageClassName: longhorn
      uwsgi:
        autoscaling:
          enabled: false
        # DefectDojo's Django baseline is ~445Mi at idle with 2 uwsgi processes,
        # so the old 512Mi limit OOM-killed uwsgi the instant the post-login
        # dashboard (`/`) loaded — surfacing as a 502 from the in-pod nginx.
        # ff-vm1 has ~10Gi free; give real headroom. No CPU limit (house
        # convention: CPU requests only — limits cause false CFS-throttle alerts).
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 1Gi
      nginx:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 128Mi
      extraEnv:
        # Cap uWSGI workers/threads to bound memory on a shared node.
        - name: DD_UWSGI_NUM_PROCESSES
          value: "2"
        - name: DD_UWSGI_NUM_THREADS
          value: "2"
        # Accept the internal host too (chart derives ALLOWED_HOSTS from `host`).
        - name: DD_ALLOWED_HOSTS
          value: "defectdojo.magmamoose.com,defectdojo.sargeant.local,localhost"
        - name: DD_CSRF_TRUSTED_ORIGINS
          value: "https://defectdojo.magmamoose.com,https://defectdojo.sargeant.local"

      # ── Bootstrap init container: Slack + GitHub config (DB-only, no REST/chart) ─
      # Runs the ORM reconcile in configmap-bootstrap.yaml on every (re)deploy.
      # Mounted via extraVolumes below. extraInitContainers render BEFORE the
      # chart's dbMigrationChecker, so the script polls for the migrated schema.
      # Pin matches chart appVersion 2.58.4 — bump together on chart upgrades.
      extraVolumes:
        - name: dd-bootstrap
          configMap:
            name: defectdojo-bootstrap
            defaultMode: 0555
      extraInitContainers:
        - name: dd-bootstrap
          image: defectdojo/defectdojo-django:2.58.4
          imagePullPolicy: IfNotPresent
          command: ["python", "/scripts/bootstrap.py"]
          volumeMounts:
            - name: dd-bootstrap
              mountPath: /scripts
              readOnly: true
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: dojo.settings.settings
            - name: DD_DATABASE_ENGINE
              value: django.db.backends.postgresql
            - name: DD_DATABASE_HOST
              value: postgres-rw.database.svc.cluster.local
            - name: DD_DATABASE_PORT
              value: "5432"
            - name: DD_DATABASE_NAME
              value: defectdojo
            - name: DD_DATABASE_USER
              value: neondb_owner
            - name: DD_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: defectdojo-postgresql-specific
                  key: postgresql-password
            - name: DD_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: defectdojo
                  key: DD_SECRET_KEY
            - name: DD_CREDENTIAL_AES_256_KEY
              valueFrom:
                secretKeyRef:
                  name: defectdojo
                  key: DD_CREDENTIAL_AES_256_KEY
            - name: SLACK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: defectdojo-integrations
                  key: SLACK_TOKEN
            - name: GITHUB_PAT
              valueFrom:
                secretKeyRef:
                  name: defectdojo-integrations
                  key: GITHUB_PAT
            - name: SLACK_CHANNEL
              value: "#engineering-alerts"
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi

    celery:
      worker:
        replicas: 1
        nodeSelector:
          node-role.kubernetes.io/worker: ""
        autoscaling:
          enabled: false
        resources:
          requests:
            cpu: 100m
            memory: 192Mi
          limits:
            cpu: 500m
            memory: 384Mi
      beat:
        # Singleton scheduler — never scale >1 (duplicates scheduled jobs).
        replicas: 1
        nodeSelector:
          node-role.kubernetes.io/worker: ""
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

    initializer:
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    # ── Shed extras not needed on firefly ─────────────────────────────────────
    monitoring:
      prometheus:
        enabled: false
    networkPolicy:
      enabled: false
    cloudsql:
      enabled: false
