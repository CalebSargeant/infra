apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - pvc.yaml
  - pv.yaml
  - configmap.yaml
  - serviceaccount.yaml
  - externalsecret.yaml
  # The Secret 'atlantis' is materialized by externalsecret.yaml from OCI
  # Vault keys: atlantis-github-app-id, atlantis-github-app-private-key,
  # atlantis-github-webhook-secret. See README.md for App creation steps.
  #
  # Optional cloud-provider credentials (AWS access keys / Azure service
  # principal). These are independent of GitHub auth — they're needed only
  # if Atlantis is driving Terraform that talks to those clouds. Create
  # them from the secret-*.yaml.template files via SOPS, then uncomment:
  # - secret-aws.enc.yaml
  # - secret-azure.enc.yaml
components:
  - ../../../../_components/resource-profiles/c.medium
  - ../../../../_components/node-selectors/pi
