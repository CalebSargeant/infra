apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: wordpress
spec:
  replicas: 1
  # Single replica on a ReadWriteOnce volume — Recreate so the old pod releases
  # the PVC before the new one starts (RollingUpdate would surge a second pod
  # that can't attach the RWO volume and stay Pending).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      # fsGroup 33 (www-data) makes the dynamic Longhorn volume writable by the
      # apache/WordPress process — a fresh PV mounts root:root, unlike the old
      # pre-chowned hostPath (uploads/.maintenance would otherwise fail to write).
      securityContext:
        fsGroup: 33
      containers:
        - name: wordpress
          image: wordpress:6.7-apache
          resources:
            requests:
              memory: "100Mi"
              cpu: "10m"
            limits:
              memory: "100Mi"
          ports:
            - containerPort: 80
          env:
            - name: WORDPRESS_DB_HOST
              value: "mariadb.database.svc.cluster.local:3306"
            - name: WORDPRESS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: wordpress-db
                  key: db-user
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-db
                  key: db-password
            - name: WORDPRESS_DB_NAME
              value: "wordpress"
            - name: WORDPRESS_TABLE_PREFIX
              value: "wp_"
          volumeMounts:
            - name: wordpress-data
              mountPath: /var/www/html
      volumes:
        - name: wordpress-data
          persistentVolumeClaim:
            claimName: wordpress-data
