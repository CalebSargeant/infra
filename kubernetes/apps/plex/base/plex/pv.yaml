# Persistent Volume for Plex Configuration
apiVersion: v1
kind: PersistentVolume
metadata:
  name: plex
  namespace: media
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: plex
  hostPath:
    path: /mnt/nvme/plex-config
---
# Persistent Volume for Movies
apiVersion: v1
kind: PersistentVolume
metadata:
  name: movies
  namespace: media
spec:
  capacity:
    storage: 100Ti
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: movies
  hostPath:
    path: /mnt/raid/movies
---
# Persistent Volume for Series
apiVersion: v1
kind: PersistentVolume
metadata:
  name: series
  namespace: media
spec:
  capacity:
    storage: 100Ti
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: series
  hostPath:
    path: /mnt/raid/series
---
# Persistent Volume for Downloads
apiVersion: v1
kind: PersistentVolume
metadata:
  name: downloads
  namespace: media
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: downloads
  # K8s-native NFS (not a host bind-mount): if NFS is unavailable the download
  # pods get FailedMount instead of ghost-filling the node root disk. Same NFS
  # server/export as the media library, so downloads never touch /dev/sdb again.
  nfs:
    server: 192.168.19.5
    path: /mnt/raid5/downloads