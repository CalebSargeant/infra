---
# Control plane: GitRepository (source for the external
# git-pull-request-dashboard repo) + image automation. These live in THIS repo
# under base/git-pull-request-dashboard and are applied from the flux-system
# source. Must reconcile before the workload below, which references the
# GitRepository it creates.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prod-git-pull-request-dashboard-source
  namespace: flux-system
  labels:
    app.kubernetes.io/sops: enabled
spec:
  interval: 10m
  path: ./kubernetes/apps/git-pull-request-dashboard/base/git-pull-request-dashboard
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
  # wait: false on purpose. This bundle includes the ImageRepository, which
  # stays NotReady until the first ghcr.io/magmamoose/git-pull-request-dashboard
  # image is published. With wait: true a NotReady ImageRepository would hang
  # this Kustomization and — via the dependsOn below — block the workload from
  # ever applying. We only need these control-plane resources APPLIED (the
  # GitRepository must exist before the workload); their health must not gate it.
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-keys
---
# Workload: the dashboard manifests, pulled from the EXTERNAL
# magmamoose/git-pull-request-dashboard repo (./k8s/overlays/prod) via the
# GitRepository created above. The image tag in that overlay is bumped by the
# ImageUpdateAutomation. The static SPA is fronted by oauth2-proxy (Google SSO)
# in the `automation` namespace; public traffic enters via the cloudflared
# tunnel -> the oauth2-proxy Service.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prod-git-pull-request-dashboard
  namespace: flux-system
spec:
  interval: 10m
  path: ./k8s/overlays/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: git-pull-request-dashboard
  timeout: 5m
  wait: true
  dependsOn:
    - name: prod-git-pull-request-dashboard-source
    - name: infrastructure-services
  # Pin the externally-sourced workload to the cloud-worker tier (ff-oci*).
  patches:
    - target:
        kind: Deployment
      patch: |
        - op: add
          path: /spec/template/spec/nodeSelector
          value:
            topology.sargeant.co/tier: native-cloud
    - target:
        kind: CronJob
      patch: |
        - op: add
          path: /spec/jobTemplate/spec/template/spec/nodeSelector
          value:
            topology.sargeant.co/tier: native-cloud
