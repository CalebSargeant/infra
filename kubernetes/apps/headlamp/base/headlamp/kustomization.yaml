apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: misc
resources:
  - configmap.yaml
  - serviceaccount.yaml
  - ../../../../components/helm-releases/headlamp.yaml
  - certificate.yaml
  - ingressroute.yaml
  - middleware.enc.yaml
  - middleware-franklinhouse.enc.yaml
  - middleware-oauth2.yaml
  - middleware-errors.yaml
  - headlamp-kubeconfigs.enc.yaml
  - oauth2-proxy.yaml
  - oauth2-proxy-secret.enc.yaml
  - oauth2-proxy-emails.enc.yaml
  - auth-redirect.yaml
#components:
#  - ../../../../components/node-selectors/native-cloud
#  - ../../../../components/ingress-standards/sargeant.co
#  - ../../../../components/helm-release-standards/configmap-values

patches:
  - target:
      kind: HelmRelease
    patch: |-
      - op: replace
        path: /metadata/name
        value: headlamp
