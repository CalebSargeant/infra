apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: n8n-db
  namespace: automation
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: n8n-db
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # n8n's neondb_owner DB password, from the single source of truth
    # (OCI Vault neondb-owner-password) that CNPG also enforces on the role.
    # Replaces the postgres-password key previously carried in the SOPS `n8n`
    # secret, which could drift from the role password.
    - secretKey: password
      remoteRef:
        key: neondb-owner-password
