---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prod-browserless
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps/browserless/base/browserless
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
  wait: true
# No `decryption` block: the only secret is an ExternalSecret (OCI Vault).
