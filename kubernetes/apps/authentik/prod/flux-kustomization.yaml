---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prod-authentik
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps/authentik/base
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 10m
  wait: true
  # Needs CNPG postgres + the shared Valkey + external-secrets up first.
  dependsOn:
    - name: infrastructure-services
