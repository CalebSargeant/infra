apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - pvc.yaml
  - pv.yaml
  - configmap.yaml
  - serviceaccount.yaml
  - externalsecret.yaml
  # Materializes Secret/atlantis-gcp from OCI Vault `atlantis-gcp-sa-key` —
  # the JSON key for the atlantis@ GCP service account. Mounted (optional)
  # by deployment.yaml as GOOGLE_APPLICATION_CREDENTIALS so terragrunt can
  # read GCS state and the google provider can impersonate deployer@.
  - externalsecret-gcp.yaml
  # OCI API key + config for the oci CLI baked into the atlantis-firefly
  # image. Mounted by deployment.yaml at /home/atlantis/.oci/ so terragrunt
  # parse-time `run_cmd("oci secrets secret-bundle get ...")` calls
  # (cloudflare/dns/prod/terragrunt.hcl etc) authenticate. SOPS-bootstrap —
  # this key itself auths OCI Vault, so it can't live there (chicken+egg),
  # same as kubernetes/infrastructure/controllers/stack/external-secrets/oci-vault-secret-enc.yaml.
  - oci-cli-secret-enc.yaml
  # The Secret 'atlantis' is materialized by externalsecret.yaml from OCI
  # Vault keys: atlantis-github-app-id, atlantis-github-app-private-key,
  # atlantis-github-webhook-secret. See README.md for App creation steps.
  #
  # Optional cloud-provider credentials (AWS access keys / Azure service
  # principal). These are independent of GitHub auth — they're needed only
  # if Atlantis is driving Terraform that talks to those clouds. Create
  # them from the secret-*.yaml.template files via SOPS, then uncomment:
  # - secret-aws.enc.yaml
  # - secret-azure.enc.yaml
components:
  - ../../../../components/resource-profiles/c.medium
  - ../../../../components/node-selectors/pi
