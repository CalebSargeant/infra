apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# External-repo app: the workload manifests live in the app's own GitHub repo.
# Unlike in-tree apps (which reference ./prod only), external apps reference
# ./base too -- base/zoey holds the in-cluster plumbing (GitRepository source,
# image automation, namespace) that the meta `apps` Kustomization applies
# directly, while prod/zoey holds the Flux Kustomization that reconciles the
# external workload.
resources:
  - ./base
  - ./prod
