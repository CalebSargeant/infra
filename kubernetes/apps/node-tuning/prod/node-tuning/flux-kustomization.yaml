---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prod-node-tuning
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps/node-tuning/base/node-tuning
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
  wait: true
