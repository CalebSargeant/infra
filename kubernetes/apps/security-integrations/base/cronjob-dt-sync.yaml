apiVersion: batch/v1
kind: CronJob
metadata:
  name: dt-defectdojo-sync
  namespace: security
spec:
  # Hourly. Reimport dedups, so re-runs are cheap + idempotent.
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: dt-defectdojo-sync
        spec:
          restartPolicy: Never
          # Heavy app pods live on the worker node (house convention).
          nodeSelector:
            node-role.kubernetes.io/worker: ""
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
          containers:
            - name: sync
              # Pin matches the DefectDojo chart appVersion (2.58.4) so the ORM
              # matches the running schema — bump together on chart upgrades.
              image: defectdojo/defectdojo-django:2.58.4
              imagePullPolicy: IfNotPresent
              command: ["python", "/scripts/sync.py"]
              env:
                - name: DJANGO_SETTINGS_MODULE
                  value: dojo.settings.settings
                # In-cluster service endpoints (no Cloudflare round-trip).
                - name: DEFECTDOJO_URL
                  value: http://defectdojo-django.security.svc.cluster.local
                - name: DTRACK_API_URL
                  value: http://dependency-track-api-server.security.svc.cluster.local:8080
                # Only High/Critical findings open GitHub issues (limit noise).
                - name: GITHUB_MIN_SEVERITY
                  value: "High"
                - name: DD_SITE_URL
                  value: https://defectdojo.magmamoose.com
                # GitHub accounts to auto-resolve repos against (github.com first,
                # then any GHE). JSON in OCI Vault; optional so a missing key just
                # disables GitHub push (findings still import).
                - name: GITHUB_TARGETS
                  valueFrom:
                    secretKeyRef:
                      name: github-issue-targets
                      key: GITHUB_TARGETS
                      optional: true
                # ── DefectDojo DB connection for the ORM (mirror the chart) ──
                - name: DD_DATABASE_ENGINE
                  value: django.db.backends.postgresql
                - name: DD_DATABASE_HOST
                  value: postgres-rw.database.svc.cluster.local
                - name: DD_DATABASE_PORT
                  value: "5432"
                - name: DD_DATABASE_NAME
                  value: defectdojo
                - name: DD_DATABASE_USER
                  value: neondb_owner
                - name: DD_DATABASE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: defectdojo-postgresql-specific
                      key: postgresql-password
                - name: DD_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: defectdojo
                      key: DD_SECRET_KEY
                - name: DD_CREDENTIAL_AES_256_KEY
                  valueFrom:
                    secretKeyRef:
                      name: defectdojo
                      key: DD_CREDENTIAL_AES_256_KEY
                # optional: lets the job start and exit cleanly (script logs
                # "DTRACK_API_KEY is empty; aborting") before the OCI Vault key
                # exists, instead of failing pods with CreateContainerConfigError.
                - name: DTRACK_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: security-integrations
                      key: DTRACK_API_KEY
                      optional: true
              volumeMounts:
                - name: sync-script
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  # CPU request only — no CPU limit (house convention).
                  cpu: 100m
                  memory: 512Mi
                limits:
                  memory: 1Gi
          volumes:
            - name: sync-script
              configMap:
                name: dt-defectdojo-sync
                defaultMode: 0555
