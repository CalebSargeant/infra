---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: automation
  namespace: flux-system
  labels:
    app.kubernetes.io/sops: enabled
spec:
  interval: 10m
  path: ./kubernetes/_clusters/firefly/automation
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
  decryption:
    provider: sops
    secretRef:
      name: sops-keys
  dependsOn:
    # Was `database` — re-pointed in Phase C; the legacy core/database
    # Kustomizations are suspended below, superseded by infrastructure-*.
    - name: infrastructure-services
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: backup
  namespace: flux-system
  labels:
    app.kubernetes.io/sops: enabled
spec:
  interval: 10m
  path: ./kubernetes/_clusters/firefly/backup
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
  decryption:
    provider: sops
    secretRef:
      name: sops-keys
  dependsOn:
    # Was `core` — re-pointed in Phase C (see note above).
    - name: infrastructure-services
---
# SUSPENDED in Phase C — superseded by the infrastructure-controllers /
# infrastructure-services Kustomizations (kubernetes/infrastructure/).
# Left in place (suspended, not deleted) for one reconcile cycle so the
# new tier can be confirmed healthy. The follow-up cleanup PR deletes
# this entry and the ./kubernetes/_clusters/firefly/core path.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: core
  namespace: flux-system
  labels:
    app.kubernetes.io/sops: enabled
spec:
  suspend: true
  interval: 10m
  path: ./kubernetes/_clusters/firefly/core
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
  wait: true
  force: true
  decryption:
    provider: sops
    secretRef:
      name: sops-keys
  dependsOn:
    - name: flux-system
---
# SUSPENDED in Phase C — superseded by infrastructure-controllers
# (cloudnative-pg now lives in kubernetes/infrastructure/controllers/).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg
  namespace: flux-system
spec:
  suspend: true
  interval: 10m
  path: ./kubernetes/_clusters/firefly/database/cloudnative-pg
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
  wait: true
  dependsOn:
    - name: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: cloudnative-pg-controller-manager
      namespace: cloudnative-pg
---
# SUSPENDED in Phase C — superseded by infrastructure-services
# (postgres + mariadb now live in kubernetes/infrastructure/services/).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: database
  namespace: flux-system
  labels:
    app.kubernetes.io/sops: enabled
spec:
  suspend: true
  interval: 10m
  path: ./kubernetes/_clusters/firefly/database
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-keys
  dependsOn:
    - name: cloudnative-pg
---
