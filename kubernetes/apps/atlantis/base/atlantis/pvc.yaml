apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: atlantis
  namespace: automation
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # Longhorn (replicated, node-independent) so Atlantis can run on the worker
  # node instead of being pinned to ff-pi1's local disk. The data dir holds only
  # reconstructible state (cloned repos + plan cache), so this starts fresh —
  # Atlantis re-clones on the next plan; no data migration needed.
  storageClassName: longhorn
