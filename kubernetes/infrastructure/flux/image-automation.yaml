---
# Single image-update automation for the whole media stack. Scans ./kubernetes/apps
# for `$imagepolicy` markers (only the 11 media workloads carry them — the
# self-managed apps' markers live in their own repos) and pushes tag bumps to
# infra's main via the App-authenticated source above.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: media
  namespace: flux-system
spec:
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: infra-image-automation
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: actions@users.noreply.github.com
        name: Flux Bot
      messageTemplate: |-
        chore(media): bump image tags
        {{range .Changed.Changes}}{{print .OldValue}} -> {{println .NewValue}}{{end}}

        [ci skip]
    push:
      branch: main
  update:
    path: "./kubernetes/apps"
    strategy: Setters
