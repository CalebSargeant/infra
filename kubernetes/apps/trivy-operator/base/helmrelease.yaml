apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
  namespace: trivy-system
spec:
  interval: 10m
  chart:
    spec:
      chart: trivy-operator
      version: "0.33.2"
      sourceRef:
        kind: HelmRepository
        name: aqua
        namespace: flux-system
      interval: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Continuously scans running workloads (images/configs/secrets) and writes
    # VulnerabilityReport/ConfigAuditReport CRDs + Prometheus metrics.
    # Skip the cluster-plumbing namespaces.
    excludeNamespaces: "kube-system,kube-public,kube-node-lease,flux-system"
    # Operator on the amd64 worker; scanner Jobs likewise.
    nodeSelector:
      node-role.kubernetes.io/worker: ""
    operator:
      # Cap concurrent scan Jobs (chart default is 10). Unbounded, trivy spawned
      # 6+ scans at once and pegged a node's CPU.
      scanJobsConcurrentLimit: 3
    trivyOperator:
      # Scan-job POD placement lives under `trivyOperator`, NOT `operator`, in this
      # chart (v0.33.2). The previous `operator.scanJobNodeSelector` was silently
      # ignored, so scan Jobs got NO nodeSelector and piled onto the control-plane
      # node ff-pi1 (which has no worker label), pegging its CPU to ~86% and causing
      # NodeNotReady flaps. Pin scan Jobs to the on-prem worker (ff-vm1).
      scanJobNodeSelector:
        node-role.kubernetes.io/worker: ""
        topology.sargeant.co/tier: on-prem
    # The cluster's kube-prometheus-stack scrapes all monitors.
    serviceMonitor:
      enabled: true
