apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      containers:
        - name: sonarr
          image: linuxserver/sonarr:4.0.18 # {"$imagepolicy": "flux-system:sonarr"}
          # right-sized: observed ~213Mi usage; request frees scheduling headroom, limit stays generous to avoid OOM
          resources:
            requests:
              memory: "320Mi"
              cpu: "10m"
            limits:
              memory: "512Mi"
          ports:
            - containerPort: 8989 # sonarr web interface
          env:
            - name: PUID
              value: "1000" # Replace with your user ID
            - name: PGID
              value: "1000" # Replace with your group ID
            - name: TZ
              value: "Europe/Amsterdam" # Replace with your timezone
            # neondb_owner DB password from the single source of truth (ExternalSecret
            # sonarr-db ← OCI Vault neondb-owner-password, also enforced on the role by
            # CNPG). This env overrides <PostgresPassword> in config.xml, so the password
            # lives in exactly one place and can't drift.
            - name: SONARR__POSTGRES__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sonarr-db
                  key: password
          volumeMounts:
            - mountPath: /config
              name: sonarr
            - mountPath: /config/config.xml
              name: sonarr-config
              subPath: config.xml
            - mountPath: /series
              name: series
            - mountPath: /downloads
              name: downloads
      volumes:
        - name: sonarr
          persistentVolumeClaim:
            claimName: sonarr
        - name: sonarr-config
          configMap:
            name: sonarr-config
        - name: series
          persistentVolumeClaim:
            claimName: series
        - name: downloads
          persistentVolumeClaim:
            claimName: downloads
