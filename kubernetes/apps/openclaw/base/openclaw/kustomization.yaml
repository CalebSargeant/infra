apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - configmap.yaml
  - externalsecret.yaml
  - pv.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
components:
  # hostPath state lives on /mnt/nvme (ff-pi1), so pin the pod to the Pi —
  # same as n8n. Adds nodeSelector {type: pi}.
  - ../../../../components/node-selectors/pi
