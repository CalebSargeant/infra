apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  replicas: 1
  # Single replica on a ReadWriteOnce config volume — Recreate so the old pod
  # releases the PVC before the new one starts (RollingUpdate would surge a second
  # pod that can't attach the RWO volume and stay Pending).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nextcloud
  template:
    metadata:
      labels:
        app: nextcloud
    spec:
      containers:
        - name: nextcloud
          image: linuxserver/nextcloud:version-31.0.1
          resources:
            # KRR: nextcloud's working set is ~123Mi; 759Mi was a ~6x over-reservation
            # that dominated ff-pi1's memory-request pressure. 256Mi keeps comfortable
            # headroom over real usage. CPU request only, no CPU limit (avoid CFS throttling).
            requests:
              memory: "256Mi"
              cpu: "10m"
            limits:
              memory: "256Mi"
          ports:
            - containerPort: 80
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Amsterdam"
          volumeMounts:
            - name: nextcloud-config
              mountPath: /config
            - name: nextcloud-data
              mountPath: /data
      volumes:
        - name: nextcloud-config
          persistentVolumeClaim:
            claimName: nextcloud-config
        - name: nextcloud-data
          persistentVolumeClaim:
            claimName: nextcloud-data
      restartPolicy: Always
