---
# Secrets come from OCI Vault (ExternalSecret) and 1Password Connect
# (OnePasswordItem); no SOPS-encrypted resources in this overlay.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: comment-commander
  namespace: flux-system
spec:
  interval: 10m
  path: ./k8s/overlays/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: comment-commander
    namespace: flux-system
  timeout: 5m
  wait: true
  dependsOn:
    # Was `core` — re-pointed in Phase C.
    - name: infrastructure-services
---
# comment-commander-pro — web dashboard / observability frontend for
# comment-commander. Secret (CC_TRIGGER_TOKEN) comes from OCI Vault via
# ExternalSecret; reads comment-commander's in-cluster Service. No SOPS.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: comment-commander-pro
  namespace: flux-system
spec:
  interval: 10m
  path: ./k8s/overlays/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: comment-commander-pro
    namespace: flux-system
  timeout: 5m
  wait: true
  dependsOn:
    # Was `core` — re-pointed in Phase C.
    - name: infrastructure-services
---
# Zoey — DB secret is mirrored from CNPG's `postgres-app` and the ghcr pull
# secret is mirrored from flux-system, both via external-secrets' kubernetes
# provider. No SOPS-encrypted resources in this overlay.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: zoey
  namespace: flux-system
spec:
  interval: 10m
  path: ./k8s/overlays/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: zoey
    namespace: flux-system
  timeout: 5m
  wait: true
  dependsOn:
    # Was [core, database] — re-pointed in Phase C; infrastructure-services
    # transitively depends on -controllers, so this still gates on the full
    # infra tier (cert-manager, external-secrets, cloudnative-pg, postgres).
    - name: infrastructure-services
---
# OpenViking — context database backing Zoey's MCP server. Its manifests live
# in the zoey repo under ./k8s-openviking (same GitRepository as `zoey`, just a
# different path), kept as a separate Kustomization so the context DB
# reconciles independently of the Zoey app. Secrets (OpenAI key, server root
# API key) come from OCI Vault via ExternalSecret. No SOPS-encrypted resources.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openviking
  namespace: flux-system
spec:
  interval: 10m
  path: ./k8s-openviking
  prune: true
  sourceRef:
    kind: GitRepository
    name: zoey
    namespace: flux-system
  timeout: 5m
  wait: true
  dependsOn:
    # Was `core` — re-pointed in Phase C.
    - name: infrastructure-services
---
# Phase 2: wraps the new infra-v2-style layout in kubernetes/clusters/firefly.
# Its output is the per-app Flux Kustomization CRs (apps/) plus, since Phase C,
# the infrastructure-configs / -controllers / -services Kustomization CRs
# (infrastructure/). No app/infra resources cross this Kustomization itself —
# those are applied by each emitted per-app / per-tier Flux Kustomization.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/clusters/firefly
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
