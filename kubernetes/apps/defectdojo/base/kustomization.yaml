apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# No top-level `namespace:` — the app runs in `security`, but the CNPG Database
# CR lives in `database`; each resource carries its own metadata.namespace.
resources:
  - configmap-bootstrap.yaml
  - database.yaml
  - externalsecret-app.yaml
  - externalsecret-db.yaml
  - externalsecret-integrations.yaml
  - externalsecret-oauth2.yaml
  - helmrelease.yaml
  - oauth2-proxy.yaml
  - valkey-password-empty.yaml
  # No Ingress: public .co traffic enters via the cloudflared tunnel → the
  # oauth2-proxy Service (Google gate). Gated apps are .co-only (Google rejects
  # .local redirect URIs). See terraform/cloudflare/zero-trust/prod/tunnels.tf.
