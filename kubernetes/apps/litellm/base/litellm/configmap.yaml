apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: automation
data:
  config.yaml: |
    # LiteLLM proxy. Claude models use per-token Anthropic API billing via
    # ANTHROPIC_API_KEY (OCI Vault -> ExternalSecret -> Deployment env). The
    # earlier Claude Max-subscription OAuth pass-through has been removed
    # (no forward_*_headers; the Claude entries now carry an api_key). The
    # gateway still authenticates clients via the master key in the
    # x-litellm-api-key header (the nginx auth-proxy maps OpenAI-style
    # `Authorization: Bearer` onto it for OpenAI-protocol clients).
    model_list:
      - model_name: claude-opus-4-8
        litellm_params:
          model: anthropic/claude-opus-4-8
          api_key: os.environ/ANTHROPIC_API_KEY
        model_info:
          mode: chat
          base_model: anthropic/claude-opus-4-8
          auth_mode: anthropic-api-key
          billing_mode: anthropic-api
          credential_source: oci-vault:litellm-anthropic-api-key
          notes: "Per-token Anthropic API billing via ANTHROPIC_API_KEY. OAuth subscription pass-through removed."
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_key: os.environ/ANTHROPIC_API_KEY
        model_info:
          mode: chat
          base_model: anthropic/claude-sonnet-4-6
          auth_mode: anthropic-api-key
          billing_mode: anthropic-api
          credential_source: oci-vault:litellm-anthropic-api-key
          notes: "Per-token Anthropic API billing via ANTHROPIC_API_KEY. OAuth subscription pass-through removed."
      - model_name: claude-haiku-4-5
        litellm_params:
          model: anthropic/claude-haiku-4-5
          api_key: os.environ/ANTHROPIC_API_KEY
        model_info:
          mode: chat
          base_model: anthropic/claude-haiku-4-5
          auth_mode: anthropic-api-key
          billing_mode: anthropic-api
          credential_source: oci-vault:litellm-anthropic-api-key
          notes: "Per-token Anthropic API billing via ANTHROPIC_API_KEY. OAuth subscription pass-through removed."
      # --- Claude Code Max OAuth pass-through (subscription-billed) ---
      # Restores the pre-eeab55b pass-through as SEPARATE -max names so the API-key
      # entries above keep serving per-token billing (openclaw). Clients (Nievah's
      # headless reviews) authenticate to LiteLLM with x-litellm-api-key and carry
      # their own Claude Code OAuth bearer in Authorization, which LiteLLM forwards
      # upstream. No API key is configured on these entries.
      - model_name: claude-opus-4-8-max
        litellm_params:
          model: anthropic/claude-opus-4-8
        model_info:
          mode: chat
          base_model: anthropic/claude-opus-4-8
          auth_mode: claude-code-oauth-pass-through
          billing_mode: claude-max-subscription
          credential_source: client_authorization_header
          notes: "Max-subscription pass-through: LiteLLM forwards the client's Claude Code OAuth bearer upstream."
      - model_name: claude-sonnet-4-6-max
        litellm_params:
          model: anthropic/claude-sonnet-4-6
        model_info:
          mode: chat
          base_model: anthropic/claude-sonnet-4-6
          auth_mode: claude-code-oauth-pass-through
          billing_mode: claude-max-subscription
          credential_source: client_authorization_header
          notes: "Max-subscription pass-through: LiteLLM forwards the client's Claude Code OAuth bearer upstream."
      - model_name: claude-haiku-4-5-max
        litellm_params:
          model: anthropic/claude-haiku-4-5
        model_info:
          mode: chat
          base_model: anthropic/claude-haiku-4-5
          auth_mode: claude-code-oauth-pass-through
          billing_mode: claude-max-subscription
          credential_source: client_authorization_header
          notes: "Max-subscription pass-through: LiteLLM forwards the client's Claude Code OAuth bearer upstream."
      - model_name: qwen2.5-coder-7b-instruct-local
        litellm_params:
          model: ollama_chat/qwen2.5-coder:7b-instruct-q4_K_M
          api_base: http://ollama-lan.automation.svc.cluster.local:11434
          api_key: os.environ/OLLAMA_LAN_API_KEY
          keep_alive: 30m
        model_info:
          mode: chat
          base_model: ollama_chat/qwen2.5-coder:7b-instruct-q4_K_M
          auth_mode: bearer-token-to-ollama-lan
          billing_mode: self-hosted
          credential_source: oci-vault:litellm-ollama-lan-api-key
          supports_function_calling: false
          supports_parallel_function_calling: false
          notes: "Self-hosted Ollama qwen2.5-coder model. LiteLLM exposes it through the OpenAI-compatible chat/completions API for clients such as Warp. Live probes show tool-call-shaped JSON in message content, not structured OpenAI tool_calls."
      # Agent-capable local model for Warp Agent Mode. Qwen3 emits native
      # structured tool_calls via Ollama's tools template, so unlike
      # qwen2.5-coder it can drive Warp's tool loop. qwen3:4b at q4 (~2.5GB)
      # fits the GTX 1060 6GB with headroom for the KV cache that Warp's large
      # agent prompts need. supports_function_calling MUST be true here, or
      # LiteLLM (with the global drop_params) strips the `tools` param and the
      # model never receives them.
      - model_name: qwen3-4b
        litellm_params:
          model: ollama_chat/qwen3:4b
          api_base: http://ollama-lan.automation.svc.cluster.local:11434
          api_key: os.environ/OLLAMA_LAN_API_KEY
          keep_alive: 30m
        model_info:
          mode: chat
          base_model: ollama_chat/qwen3:4b
          auth_mode: bearer-token-to-ollama-lan
          billing_mode: self-hosted
          credential_source: oci-vault:litellm-ollama-lan-api-key
          supports_function_calling: true
          supports_parallel_function_calling: false
          notes: "Self-hosted Ollama qwen3:4b-q4_K_M. Tool-calling enabled for Warp Agent Mode (native tool_calls via Ollama's tools template). Sized for GTX 1060 6GB at q4."
      # --- OpenAI (per-token API billing via OPENAI_API_KEY) ---
      - model_name: gpt-5.5
        litellm_params:
          model: openai/gpt-5.5
          api_key: os.environ/OPENAI_API_KEY
        model_info:
          mode: chat
          base_model: openai/gpt-5.5
          billing_mode: openai-api
          credential_source: oci-vault:openai-api-key
      - model_name: gpt-5.4-mini
        litellm_params:
          model: openai/gpt-5.4-mini
          api_key: os.environ/OPENAI_API_KEY
        model_info:
          mode: chat
          base_model: openai/gpt-5.4-mini
          billing_mode: openai-api
          credential_source: oci-vault:openai-api-key
      # --- DeepSeek (per-token API billing via DEEPSEEK_API_KEY) ---
      - model_name: deepseek-v4-pro
        litellm_params:
          model: deepseek/deepseek-v4-pro
          api_key: os.environ/DEEPSEEK_API_KEY
          api_base: https://api.deepseek.com
        model_info:
          mode: chat
          base_model: deepseek/deepseek-v4-pro
          billing_mode: deepseek-api
          credential_source: oci-vault:litellm-deepseek-api-key
      - model_name: deepseek-v4-flash
        litellm_params:
          model: deepseek/deepseek-v4-flash
          api_key: os.environ/DEEPSEEK_API_KEY
          api_base: https://api.deepseek.com
        model_info:
          mode: chat
          base_model: deepseek/deepseek-v4-flash
          billing_mode: deepseek-api
          credential_source: oci-vault:litellm-deepseek-api-key
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      # Forward the client's Authorization (the Claude OAuth token) to Anthropic for
      # the -max pass-through entries. NOTE: this is a GLOBAL flag; it was removed in
      # eeab55b because forwarded bearers can upset per-token API entries. Watch
      # openclaw after rollout (see PR body).
      forward_client_headers_to_llm_api: true
      # Dedicated header for the proxy master key. The nginx auth-proxy maps
      # OpenAI-style `Authorization: Bearer` onto this header for OpenAI-protocol
      # clients (Warp, Codex, Hermes, the OpenAI SDK).
      litellm_key_header_name: x-litellm-api-key
    litellm_settings:
      # Forward provider-specific auth headers such as Claude's OAuth bearer token
      # (pairs with forward_client_headers_to_llm_api above; pre-eeab55b behaviour).
      forward_llm_provider_auth_headers: true
      drop_params: true
