apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # automation
  - ./atlantis
  - ./homeassistant
  - ./homebridge
  - ./mikrotik-minder
  - ./n8n
  # magmamoose products (open-core dashboards; external-repo + image automation)
  - ./diatreme-pro
  # backup
  - ./timemachine
  # miscellaneous (dashboard)
  - ./headlamp
  # media
  - ./bazarr
  - ./flaresolverr
  - ./jackett
  - ./nzbhydra2
  - ./overseerr
  - ./plex
  - ./prowlarr
  - ./qbittorrent
  - ./radarr
  - ./sabnzbd
  - ./sonarr
  # miscellaneous
  - ./excalidraw
  - ./nextcloud
  - ./syncthing
  - ./wordpress
  # observability
  - ./blackbox-exporter
  - ./fluent-bit
  - ./krr
  - ./kube-prometheus-stack
  - ./loki
  - ./thanos-compactor
  - ./thanos-query
  - ./thanos-store
  # security
  - ./gatekeeper
  - ./kubescape
  # external-repo apps (workload manifests live in their own GitHub repos;
  # each dir holds only the in-cluster Flux plumbing — source, image
  # automation, namespace, and the Flux Kustomization that pulls the workload)
  - ./buxfer-sync
  - ./comment-commander
  - ./comment-commander-pro
  - ./deskbird-booking
  - ./fortivpn-gateway
  - ./openviking
  - ./zoey
