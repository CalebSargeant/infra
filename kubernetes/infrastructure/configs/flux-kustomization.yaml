---
# Cluster-wide config: namespaces for the infrastructure + (eventually)
# app tiers. First link in the infra dependency chain —
# configs → controllers → services.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-configs
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/infrastructure/configs/namespaces
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
  wait: true
