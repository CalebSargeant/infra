apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: external-dns-cloudflare
  namespace: core
  labels:
    app.kubernetes.io/name: external-dns-cloudflare
spec:
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: "8.0.*"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: false
  values:
    # Use kubernetes-sigs image for better ARM64 support
    image:
      registry: registry.k8s.io
      repository: external-dns/external-dns
      tag: v0.20.0

    # Provider configuration
    provider: cloudflare

    # Cloudflare configuration
    cloudflare:
      secretName: cloudflare-credentials
      proxied: false

    # Zones managed by this external-dns instance. The mikrotik sibling
    # only manages `.local`, so domain filters alone scope us cleanly —
    # no need for an annotation filter (the previous one self-conflicted
    # with the same annotation's role as the DNS target value, and the
    # pod has been logging "All records are already up to date" for the
    # last 32 days because no resource could ever satisfy it).
    domainFilters:
      - sargeant.co
      - magmamoose.com

    # Source configuration - watch both Ingress and Service resources
    sources:
      - ingress
      - service

    # Policy configuration - sync creates, updates, and deletes DNS records
    policy: sync

    # Registry configuration - use TXT records to track ownership
    registry: txt
    txtOwnerId: firefly-k8s
    txtPrefix: externaldns-

    # Resource configuration
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

    # Node selector
    nodeSelector:
      type: pi

    # Log configuration
    logLevel: info
    logFormat: json
