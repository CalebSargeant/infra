apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlantis
  namespace: automation
  labels:
    app: atlantis
spec:
  replicas: 1
  # Single replica pinned to type=pi (ff-pi1) which doesn't have headroom
  # for two atlantis pods simultaneously. Default RollingUpdate keeps old
  # pod up until new is Ready and starves on
  #   "0/2 nodes available: 1 Insufficient cpu/memory,
  #   1 didn't match node affinity/selector"
  # Recreate: kill old → start new. Brief outage (seconds during image
  # pull) is acceptable for a PR-only tool.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: atlantis
  template:
    metadata:
      labels:
        app: atlantis
    spec:
      serviceAccountName: atlantis
      securityContext:
        # Atlantis upstream image uses UID 100 / GID 1000 for the atlantis user.
        # Be explicit so a kubelet that ignores image USER doesn't fall back to root.
        runAsUser: 100
        runAsGroup: 1000
        fsGroup: 1000
        # The PVC was first mounted long ago with different ownership; force k8s
        # to recursively chgrp the volume root on each pod start until it matches.
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        # The existing PVC has files owned by old UIDs (created before this
        # securityContext was set). fsGroup chgrp's but doesn't chown the existing
        # files — atlantis still can't *create* new entries because the dir itself
        # is owned by an alien user. This init container repairs ownership on
        # first run and is a no-op on every subsequent pod start: it stat's the
        # volume root and only walks the tree if owner != 100:1000.
        - name: fix-data-ownership
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              OWNER=$(stat -c '%u:%g' /atlantis-data)
              if [ "$OWNER" = "100:1000" ]; then
                echo "ownership already correct ($OWNER), skipping chown"
                exit 0
              fi
              echo "current owner $OWNER != 100:1000, repairing..."
              chown -R 100:1000 /atlantis-data
              chmod -R u+rwX,g+rwX /atlantis-data
              echo "done"
          securityContext:
            runAsUser: 0          # need root to chown
            runAsGroup: 0
            runAsNonRoot: false
          volumeMounts:
            - name: atlantis-data
              mountPath: /atlantis-data
      containers:
        - name: atlantis
          # Custom image: upstream runatlantis/atlantis with oci-cli +
          # terragrunt baked in (see dockerfiles/atlantis-firefly/Dockerfile
          # and .github/workflows/docker-publish.yml). Replaces the earlier
          # install-terragrunt initContainer — that worked for terragrunt
          # alone, but oci-cli needs a full python runtime + ~40 pip deps
          # which is too much to wedge into a per-start init container.
          #
          # :latest is fine here because kubelet defaults to imagePullPolicy
          # Always for the `latest` tag, so a `Recreate` rollout (strategy
          # above) on a Dockerfile bump picks up the new image. For pinned
          # rollbacks, push tag `atlantis-firefly-v<rev>` and switch this
          # line to `:v<rev>`.
          image: ghcr.io/calebsargeant/atlantis-firefly:latest
          resources:
            # ~55Mi idle; KRR ~228Mi. Request trimmed to 256Mi to free ff-pi1
            # memory-request pressure; 2Gi limit retained as burst headroom for
            # `parallel_plan` terragrunt spikes. No CPU limit (avoid CFS throttling).
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
          env:
            # k8s secret mounts default to root-owned with group-readable
            # mode (we set 0440 below); oci CLI prints a noisy warning on
            # private-key files that aren't 600. Suppress so terragrunt
            # run_cmd output stays clean in PR comments.
            - name: OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING
              value: "True"
            # GCP service-account key file (Secret atlantis-gcp materialized
            # by externalsecret-gcp.yaml). Picked up by the GCS backend (for
            # state reads/writes) and the google provider (which then
            # impersonates deployer@ — see terraform/root.hcl). The mount
            # below is optional: true so the pod still rolls before you've
            # uploaded `atlantis-gcp-sa-key` to OCI Vault — terragrunt plan
            # will just error with a clear "no GCP credentials" message.
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /etc/atlantis/gcp/key.json
            - name: ATLANTIS_REPO_ALLOWLIST
              value: "github.com/CalebSargeant/infra"
            # GitHub App auth (replaces ATLANTIS_GH_USER/_TOKEN PAT flow).
            # The App ID and PEM key come from the Secret 'atlantis' which is
            # materialized by externalsecret.yaml pulling from OCI Vault.
            - name: ATLANTIS_GH_APP_ID
              valueFrom:
                secretKeyRef:
                  name: atlantis
                  key: app-id
            - name: ATLANTIS_GH_APP_KEY_FILE
              value: /etc/atlantis/github-app/private-key.pem
            - name: ATLANTIS_GH_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: atlantis
                  key: webhook-secret
            # Required when using GitHub App auth — Atlantis writes a temporary
            # git credentials file to /home/atlantis/.git-credentials so `git clone`
            # via the App installation token works. Without this flag the server
            # refuses to start: "Github App requires --write-git-creds to support cloning".
            - name: ATLANTIS_WRITE_GIT_CREDS
              value: "true"
            - name: ATLANTIS_PORT
              value: "4141"
            - name: ATLANTIS_ATLANTIS_URL
              value: "https://atlantis.sargeant.co"
            - name: ATLANTIS_DATA_DIR
              value: "/atlantis-data"
            - name: ATLANTIS_REPO_CONFIG_JSON
              valueFrom:
                configMapKeyRef:
                  name: atlantis-config
                  key: repos.json
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: atlantis-aws
                  key: access-key-id
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: atlantis-aws
                  key: secret-access-key
                  optional: true
            - name: AWS_REGION
              value: "us-east-1"
            - name: ARM_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: atlantis-azure
                  key: client-id
                  optional: true
            - name: ARM_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: atlantis-azure
                  key: client-secret
                  optional: true
            - name: ARM_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: atlantis-azure
                  key: tenant-id
                  optional: true
            - name: ARM_SUBSCRIPTION_ID
              valueFrom:
                secretKeyRef:
                  name: atlantis-azure
                  key: subscription-id
                  optional: true
          ports:
            - name: atlantis
              containerPort: 4141
          volumeMounts:
            - name: atlantis-data
              mountPath: /atlantis-data
            - name: github-app-key
              mountPath: /etc/atlantis/github-app
              readOnly: true
            # OCI CLI looks for config + key at $HOME/.oci/. terragrunt.hcl
            # files use parse-time run_cmd("oci secrets secret-bundle get ...")
            # to fetch tokens (e.g. cloudflare API token) from OCI Vault — the
            # cli would otherwise hang on a "create config file? [Y/n]" prompt.
            - name: oci-cli
              mountPath: /home/atlantis/.oci
              readOnly: true
            # GCP SA JSON key for terragrunt's GCS backend + google provider
            # impersonation. Referenced by GOOGLE_APPLICATION_CREDENTIALS env
            # above. The volume (below) is optional: true so the pod can roll
            # before atlantis-gcp-sa-key is uploaded to OCI Vault.
            - name: gcp-sa-key
              mountPath: /etc/atlantis/gcp
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4141
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4141
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: atlantis-data
          persistentVolumeClaim:
            claimName: atlantis
        - name: github-app-key
          secret:
            secretName: atlantis
            items:
              - key: app-key-pem
                path: private-key.pem
            # 0440 (group-readable) so the atlantis container user can read it
            # via fsGroup: 1000 (set at the pod securityContext). Not 0400 —
            # that's owner-only and the container runs non-root.
            defaultMode: 0440
        # Secret atlantis-oci-cli (SOPS-decrypted by Flux at apply time —
        # see oci-cli-secret-enc.yaml) carries two files:
        #   - config  → /home/atlantis/.oci/config   (oci CLI default path)
        #   - key.pem → /home/atlantis/.oci/key.pem  (referenced by config)
        - name: oci-cli
          secret:
            secretName: atlantis-oci-cli
            defaultMode: 0440
        # Secret atlantis-gcp materialized by externalsecret-gcp.yaml from
        # OCI Vault `atlantis-gcp-sa-key`. optional: true so the pod stays
        # Up before the OCI Vault upload is done — terragrunt plans error
        # with a clear "no GCP credentials" instead of pod stuck in mount.
        - name: gcp-sa-key
          secret:
            secretName: atlantis-gcp
            optional: true
            defaultMode: 0440
