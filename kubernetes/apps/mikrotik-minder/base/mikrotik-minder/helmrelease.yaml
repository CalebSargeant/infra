---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mikrotik-minder-agent
  namespace: automation
spec:
  interval: 10m
  chart:
    spec:
      chart: mikrotik-minder-agent
      # >= 0.1.1 picks up the chart fix in CalebSargeant/helm-charts#10
      version: ">=0.1.1 <0.2.0"
      sourceRef:
        kind: HelmRepository
        name: calebsargeant
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  # The agent's git deploy key comes from the mikrotik-minder-agent-git-deploy-key
  # ExternalSecret and is injected as git.sshKey — the chart renders it into the
  # git-ssh Secret it mounts. Keeps the private key out of this public repo.
  valuesFrom:
    - kind: Secret
      name: mikrotik-minder-agent-git-deploy-key
      valuesKey: sshKey
      targetPath: git.sshKey
  values:
    image:
      # Chart's appVersion is the agent's __version__ (e.g. "0.0.1"), but the
      # release-runner workflow re-tags the image with 1.X.Y on every release.
      # Pin a concrete release tag here so HelmRelease isn't tied to appVersion.
      tag: "1.2.0"
      pullPolicy: IfNotPresent

    config:
      server:
        url: https://mikrotik-minder.sargeant.workers.dev
        agent_token_env: MTM_AGENT_TOKEN
        timeout_seconds: 10
      defaults:
        transport:
          primary: api
          fallback: ssh
        heartbeat_interval_seconds: 300
        export_interval_seconds: 3600
        update_check_interval_seconds: 21600
        backup_interval_seconds: 86400
        connect_timeout_seconds: 8
      git:
        repo: /var/lib/mikrotik-minder/configs
        # Push every /export commit to the private config repo the Pro app's
        # config browser reads. The SSH deploy key is mounted at ssh_key_path
        # by the chart (see valuesFrom above).
        remote:
          url: git@github.com:CalebSargeant/mikrotik-configs.git
          branch: main
          ssh_key_path: /etc/mikrotik-minder/ssh/git_deploy
          push: true
      backup:
        dir: /var/lib/mikrotik-minder/backups
        password_env: MTM_BACKUP_PASSWORD
        retention: 14
      devices:
        - name: oci-rtr-01
          address: 193.123.39.172
          username: test
          password_env: OCI_RTR_01_PASSWORD
          site: oci
          role: lab

    secrets:
      create: false
      existingSecretName: mikrotik-minder-agent-env

    persistence:
      enabled: true
      size: 5Gi

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
