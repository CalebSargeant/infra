apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatekeeper
  namespace: security
spec:
  interval: 10m
  chart:
    spec:
      chart: gatekeeper
      version: 3.18.3
      sourceRef:
        kind: HelmRepository
        name: gatekeeper
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Enable audit and mutation features
    audit:
      replicas: 1
      resources:
        # KRR ~146Mi working set. No CPU limit (avoid CFS throttling).
        requests:
          cpu: 50m
          memory: 150Mi
        limits:
          memory: 150Mi

    controllerManager:
      replicas: 1
      resources:
        # KRR ~198Mi working set; trimmed from 256Mi. 256Mi limit kept as
        # admission burst headroom. No CPU limit (avoid CFS throttling).
        requests:
          cpu: 100m
          memory: 200Mi
        limits:
          memory: 256Mi

    # Enable violations logging
    auditInterval: 60
    constraintViolationsLimit: 20
    auditFromCache: false

    # Exempt namespaces
    exemptNamespaces:
      - kube-system
      - flux-system

    # Enable mutation webhook
    enableMutation: true

    # Webhook settings
    webhook:
      replicas: 1
      resources:
        # Admission path; 200Mi request with 256Mi burst headroom.
        # No CPU limit (avoid CFS throttling).
        requests:
          cpu: 100m
          memory: 200Mi
        limits:
          memory: 256Mi
