apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-backup-oci
  namespace: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: postgres-backup-oci
    creationPolicy: Owner
  # Vault secret backup-oci-s3-credentials holds JSON:
  # {access_key, secret_key, endpoint, region, namespace} (created by terraform/oci/.../backups)
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: backup-oci-s3-credentials
        property: access_key
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: backup-oci-s3-credentials
        property: secret_key
