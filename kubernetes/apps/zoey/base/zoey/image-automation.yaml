---
# Backend image automation
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: zoey-backend
  namespace: flux-system
spec:
  image: ghcr.io/magmamoose/zoey-backend
  interval: 5m
  provider: generic
  secretRef:
    name: ghcr-pull-secret
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: zoey-backend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: zoey-backend
  filterTags:
    pattern: '^v[0-9]+\.[0-9]+\.[0-9]+$'
    extract: '$0'
  policy:
    semver:
      range: '>=0.1.0'
---
# Frontend image automation
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: zoey-frontend
  namespace: flux-system
spec:
  image: ghcr.io/magmamoose/zoey-frontend
  interval: 5m
  provider: generic
  secretRef:
    name: ghcr-pull-secret
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: zoey-frontend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: zoey-frontend
  filterTags:
    pattern: '^v[0-9]+\.[0-9]+\.[0-9]+$'
    extract: '$0'
  policy:
    semver:
      range: '>=0.1.0'
---
# Shared image update automation -- Flux rewrites tags in k8s/overlays/prod/
# kustomization.yaml against the per-target `$imagepolicy` markers and pushes
# the bump back to the zoey repo's main branch.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: zoey
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: zoey
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: actions@users.noreply.github.com
        name: Flux Bot
      messageTemplate: |-
        chore: update zoey image tags
        {{range .Changed.Changes}}{{print .OldValue}} -> {{println .NewValue}}{{end}}

        [ci skip]
    push:
      branch: main
  update:
    path: "./k8s/overlays/prod"
    strategy: Setters
