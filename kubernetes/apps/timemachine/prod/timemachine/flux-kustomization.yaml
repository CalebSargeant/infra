---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prod-timemachine
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps/timemachine/base/timemachine
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
  wait: true
