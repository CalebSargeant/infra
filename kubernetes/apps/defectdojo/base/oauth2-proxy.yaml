apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      # Stateless — pin to the worker node like everything else here.
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=google
            - --email-domain=magmamoose.com
            - --http-address=0.0.0.0:4180
            # Full-proxy mode: oauth2-proxy fronts DefectDojo. Public .co traffic
            # reaches here via the cloudflared tunnel (tunnels.tf), so the gate
            # actually applies (the tunnel bypasses Traefik/Ingress).
            - --upstream=http://defectdojo-django.security.svc.cluster.local:80
            - --redirect-url=https://defectdojo.sargeant.co/oauth2/callback
            - --reverse-proxy=true
            - --cookie-secure=true
            - --cookie-domain=.sargeant.co
            - --whitelist-domain=.sargeant.co
            - --skip-provider-button=true
            # DefectDojo's REST API + inbound webhooks use their own token/secret
            # auth and are called by non-browser clients — bypass the Google gate
            # for them (still proxied to DefectDojo, which enforces token auth).
            - --skip-auth-route=^/api/v2
            - --skip-auth-route=^/webhook
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy
                  key: cookie-secret
          ports:
            - name: http
              containerPort: 4180
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: security
spec:
  selector:
    app: oauth2-proxy
  ports:
    - name: http
      port: 4180
      targetPort: http
