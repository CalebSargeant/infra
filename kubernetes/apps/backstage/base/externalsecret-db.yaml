apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backstage-db
  namespace: core
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: backstage-db
    creationPolicy: Owner
    template:
      # Backstage reads POSTGRES_PASSWORD from key `password` (see the HelmRelease
      # extraEnvVars). `username` kept for parity with the other *-db secrets.
      type: kubernetes.io/basic-auth
      data:
        username: neondb_owner
        password: "{{ .password }}"
  data:
    # Same source of truth CNPG enforces on the `neondb_owner` role.
    - secretKey: password
      remoteRef:
        key: neondb-owner-password
