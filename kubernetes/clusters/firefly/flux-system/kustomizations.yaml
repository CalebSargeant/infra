# Phase E retirement: the 6 legacy category Kustomizations
# (automation/backup/media/misc/observability/security) — all now
# namespace-only after their apps migrated to apps/ — were retired and
# their namespaces consolidated into infrastructure-configs. The
# suspended core/database/cloudnative-pg Kustomizations from Phase C
# were also deleted (their content moved to infrastructure-controllers /
# -services).
#
# The per-app external-repo Flux Kustomizations (buxfer-sync,
# deskbird-booking, fortivpn-gateway, comment-commander, comment-commander-pro,
# zoey, openviking) were also folded into apps/<app>/prod/<app>/, alongside
# their GitRepository sources and image automation under apps/<app>/base/.
# What remains here is just the meta `apps` Kustomization that builds
# clusters/firefly/.
---
# Meta Kustomization — builds kubernetes/clusters/firefly/, which renders the
# per-app (apps/<app>/prod/<app>/flux-kustomization.yaml) and per-tier
# (infrastructure/{configs,controllers,services}/flux-kustomization.yaml)
# Flux Kustomization CRs. No app/tier resources cross this Kustomization
# itself — those are applied by each emitted Flux Kustomization.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/clusters/firefly
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
