apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw
  namespace: automation
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # Longhorn (replicated, node-independent) so openclaw runs on the worker
  # instead of being pinned to ff-pi1's local /mnt/nvme/openclaw. State+config+
  # identity (~1.4M, incl. the sqlite db) is migrated before cutover.
  storageClassName: longhorn
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-auth
  namespace: automation
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # Longhorn — auth-profile dir is empty today, starts fresh on the worker.
  storageClassName: longhorn
