---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: database
spec:
  instances: 3

  # Pin all instances to the on-prem worker (ff-vm1) and OFF the control-plane node
  # ff-pi1. CNPG's default required pod-anti-affinity was spreading instances across
  # nodes, sending postgres-3 to ff-pi1 where it sat Pending (the Pi is a pure
  # system node). Storage is node-local (local-path), so instances must stay on the
  # on-prem worker; disabling anti-affinity lets all three co-locate there. HA/DR is
  # covered by the CNPG OCI S3 backups below, not by node spread.
  affinity:
    nodeSelector:
      node-role.kubernetes.io/worker: ""
      topology.sargeant.co/tier: on-prem
    enablePodAntiAffinity: false

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
      maintenance_work_mem: "64MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      work_mem: "1310kB"
      huge_pages: "off"
      min_wal_size: "1GB"
      max_wal_size: "4GB"

  storage:
    size: 10Gi
    storageClass: local-path

  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: postgres-app-user

  monitoring:
    enablePodMonitor: true

  managed:
    # CNPG reconciles ONLY the roles declared here; every other role (postgres, app,
    # litellm, excalidraw, ...) is left untouched.
    #
    # IMPORTANT: a managed role's attributes are reconciled to EXACTLY what's declared
    # — any attribute omitted is reset to the CNPG default (e.g. createdb/createrole →
    # false). So `neondb_owner` below lists its full attribute set verbatim to avoid
    # stripping privileges.
    roles:
      # `admin` — superuser used exclusively by nextcloud; password sourced from the
      # basic-auth secret nextcloud-db-admin (ExternalSecret → OCI Vault
      # nextcloud-db-admin-password) rather than set by hand on the primary.
      - name: admin
        ensure: present
        login: true
        superuser: true
        passwordSecret:
          name: nextcloud-db-admin
      # `neondb_owner` — shared LOGIN role for n8n, homeassistant, sonarr, radarr,
      # prowlarr (a Neon-migration leftover). On 2026-06-14 its password drifted from
      # the apps' stored copies and every app failed auth on restart. Declaring it here
      # makes CNPG enforce the password from the neondb-owner secret (ExternalSecret →
      # OCI Vault neondb-owner-password), so manual drift is auto-reverted. Replaces the
      # interim SOPS secret postgres-neondb-owner-credentials (#385) with an OCI Vault
      # source, for parity with admin. Attributes mirror the live Neon owner (createdb,
      # createrole, replication, bypassrls) so none are stripped.
      - name: neondb_owner
        ensure: present
        login: true
        superuser: false
        createdb: true
        createrole: true
        inherit: true
        replication: true
        bypassrls: true
        connectionLimit: -1
        passwordSecret:
          name: neondb-owner

  backup:
    barmanObjectStore:
      destinationPath: s3://postgres-backups/
      # OCI Object Storage (S3-compat) — offsite, survives cluster loss (unlike in-cluster MinIO).
      # Creds via ExternalSecret postgres-backup-oci (from OCI Vault backup-oci-s3-credentials).
      endpointURL: https://axn3gwpaabzc.compat.objectstorage.eu-amsterdam-1.oraclecloud.com
      s3Credentials:
        accessKeyId:
          name: postgres-backup-oci
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: postgres-backup-oci
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 2
    # 2-day recovery window. WAL archives ~1.2 GiB/day, so retention is the
    # dominant driver of Object Storage size; kept short to stay inside OCI's
    # 10 GiB Always Free tier. PITR within the window; primary data is on-cluster.
    retentionPolicy: "2d"
