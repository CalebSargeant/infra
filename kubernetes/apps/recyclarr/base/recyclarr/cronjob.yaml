apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr
  namespace: media
spec:
  schedule: "0 4 * * *" # daily 04:00 — reconcile Sonarr quality from TRaSH
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          nodeSelector:
            type: mini
          containers:
            - name: recyclarr
              image: ghcr.io/recyclarr/recyclarr:8.6.0
              args: ["sync"]
              env:
                - name: SONARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: recyclarr-secrets
                      key: SONARR_API_KEY
              volumeMounts:
                - name: config
                  mountPath: /config/recyclarr.yml
                  subPath: recyclarr.yml
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  memory: 192Mi
          volumes:
            - name: config
              configMap:
                name: recyclarr-config
