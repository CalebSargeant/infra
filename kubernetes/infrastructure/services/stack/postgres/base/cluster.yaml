---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: database
spec:
  instances: 3
  
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
      maintenance_work_mem: "64MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      work_mem: "1310kB"
      huge_pages: "off"
      min_wal_size: "1GB"
      max_wal_size: "4GB"
  
  storage:
    size: 10Gi
    storageClass: local-path
  
  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: postgres-app-user
  
  monitoring:
    enablePodMonitor: true

  managed:
    # Only the roles declared here are reconciled by CNPG; every other role
    # (postgres, app, litellm, ...) is left untouched. Declaring a role keeps its
    # password in sync with its passwordSecret so it can't silently drift from what
    # the apps store — a neondb_owner drift took n8n/sonarr/radarr/etc. offline.
    # Attributes mirror the live roles exactly, so the first reconcile is a no-op.
    roles:
      # Superuser used exclusively by nextcloud; password from OCI Vault.
      - name: admin
        ensure: present
        login: true
        superuser: true
        passwordSecret:
          name: nextcloud-db-admin
      # Shared app-owner role (n8n, the *arr apps, homeassistant, excalidraw, ...).
      # Password from the SOPS secret postgres-neondb-owner-credentials (move to an
      # OCI Vault ExternalSecret later for parity with admin). createdb/createrole/
      # replication/bypassrls match the live role — omitting them would strip them.
      - name: neondb_owner
        ensure: present
        login: true
        superuser: false
        createdb: true
        createrole: true
        inherit: true
        replication: true
        bypassrls: true
        connectionLimit: -1
        passwordSecret:
          name: postgres-neondb-owner-credentials

  backup:
    barmanObjectStore:
      destinationPath: s3://postgres-backups/
      # OCI Object Storage (S3-compat) — offsite, survives cluster loss (unlike in-cluster MinIO).
      # Creds via ExternalSecret postgres-backup-oci (from OCI Vault backup-oci-s3-credentials).
      endpointURL: https://axn3gwpaabzc.compat.objectstorage.eu-amsterdam-1.oraclecloud.com
      s3Credentials:
        accessKeyId:
          name: postgres-backup-oci
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: postgres-backup-oci
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 2
    retentionPolicy: "30d"
