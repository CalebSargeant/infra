apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Phase C — core + database tier namespaces
  - core-namespace.yaml
  - database-namespace.yaml
  # OCI native-cloud Postgres tier (postgres-oci CNPG cluster)
  - database-oci-namespace.yaml
  # Phase E — consolidated from the now-deleted legacy category KS
  - automation-namespace.yaml
  - backup-namespace.yaml
  - media-namespace.yaml
  - misc-namespace.yaml
  - observability-namespace.yaml
  - security-namespace.yaml
  # shared ingress/networking tier (Traefik + app Ingresses) — relocated here
  # from clusters/firefly/flux-system/_namespaces.yaml
  - networking-namespace.yaml
  # pod-gateway (shared Privado VPN gateway) lives here; media apps route through it
  - vpn-gateway-namespace.yaml
