apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cert-manager
  - external-secrets
  - 1password-connect
  - cloudnative-pg
  - longhorn
patches:
  # cert-manager node placement + resource-profile labels — carried over
  # verbatim from the legacy _clusters/firefly/core/kustomization.yaml
  # category-level patch block.
  - patch: |
      - op: add
        path: /metadata/labels/node-selector
        value: pi
    target:
      labelSelector: "app.kubernetes.io/name=cert-manager"
  - patch: |
      - op: add
        path: /metadata/labels/resource-profile
        value: t.small
    target:
      labelSelector: "app.kubernetes.io/name=cert-manager"
