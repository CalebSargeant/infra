apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backstage-github
  namespace: core
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: backstage-github
    creationPolicy: Owner
  data:
    # GitHub PAT used by Backstage's GitHub integration (catalog reads, scaffolder,
    # TechDocs sources). OPTIONAL: until this key exists in OCI Vault, the secret is
    # simply absent and the HelmRelease's optional GITHUB_TOKEN env tolerates it —
    # Backstage still boots, GitHub-sourced content just doesn't load.
    - secretKey: token
      remoteRef:
        key: backstage-github-token
