apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: atlantis
  namespace: automation
spec:
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: atlantis
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # GitHub App ID (a number, e.g. "12345678")
    - secretKey: app-id
      remoteRef:
        key: atlantis-github-app-id

    # PEM-formatted private key downloaded from the GitHub App settings
    # ("Generate a private key" → atlantis-firefly.YYYY-MM-DD.private-key.pem)
    - secretKey: app-key-pem
      remoteRef:
        key: atlantis-github-app-private-key

    # The webhook secret you set when creating the App
    # (and configured on the App's webhook in github.com/settings/apps/...)
    - secretKey: webhook-secret
      remoteRef:
        key: atlantis-github-webhook-secret
