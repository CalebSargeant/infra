apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flagger
  namespace: flagger-system
spec:
  interval: 10m
  chart:
    spec:
      chart: flagger
      version: "1.43.0"
      sourceRef:
        kind: HelmRepository
        name: flagger
        namespace: flux-system
      interval: 10m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # Progressive-delivery controller. Traefik (the k3s ingress) is the
    # traffic-shifting provider for canaries.
    meshProvider: traefik
    # Reuse the existing kube-prometheus-stack for canary metric analysis (don't
    # install Flagger's bundled Prometheus). `prometheus-operated` is the
    # prometheus-operator's always-present Service in the observability namespace.
    metricsServer: "http://prometheus-operated.observability.svc.cluster.local:9090"
    prometheus:
      install: false
    # Controller on the amd64 worker.
    nodeSelector:
      node-role.kubernetes.io/worker: ""
