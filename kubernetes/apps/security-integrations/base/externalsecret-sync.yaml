apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  # Used by the dt-defectdojo-sync CronJob to read findings from Dependency-Track.
  name: security-integrations
  namespace: security
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: security-integrations
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # Dependency-Track API key for a team with VIEW_PORTFOLIO + VIEW_VULNERABILITY.
    # Create once in DTrack (Administration -> Teams -> API Keys), store in OCI Vault.
    - secretKey: DTRACK_API_KEY
      remoteRef:
        key: dependency-track-api-key
    # SonarQube user token DefectDojo uses to pull security findings
    # (SonarQube -> My Account -> Security -> Generate Token). Store in OCI Vault.
    - secretKey: SONARQUBE_TOKEN
      remoteRef:
        key: sonarqube-defectdojo-token
