---
# Consolidated image-update automation for the media stack — third-party apps
# (Sonarr/Radarr/Plex/etc.) that live entirely in THIS repo and all push tag
# bumps to infra's main. Unlike the self-managed apps (zoey, buxfer-sync, …),
# which each own their source repo and carry their automation in
# apps/<app>/base/<app>/, these share one ImageUpdateAutomation here.
#
# Per-image ImageRepository + ImagePolicy (semver, current major held) stay
# flux-system-namespaced, so the workload markers remain `flux-system:<app>`:
#   image: linuxserver/sonarr:4.0.15 # {"$imagepolicy": "flux-system:sonarr"}
#
# Applied by the bootstrap `flux-system` Kustomization (this dir is referenced
# from clusters/firefly/flux-system/kustomization.yaml), same as the other
# shared Flux config here.

# ---------------------------------------------------------------------------
# Push source: the infra repo authenticated as the GitHub App (a `main` ruleset
# bypass actor). The bootstrap `flux-system` GitRepository uses the SSH deploy
# key, which is NOT a bypass actor — its direct pushes to main are declined by
# the branch ruleset. This App-authenticated source is what lets the bumps land.
# ---------------------------------------------------------------------------
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: infra-image-automation
  namespace: flux-system
spec:
  interval: 10m
  provider: github
  ref:
    branch: main
  secretRef:
    name: buxfer-sync-github-app
  url: https://github.com/CalebSargeant/infra
---
# --- sonarr (linuxserver/sonarr) ---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: sonarr
  namespace: flux-system
spec:
  image: linuxserver/sonarr
  interval: 1h
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: sonarr
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: sonarr
  filterTags:
    pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
    extract: '$0'
  policy:
    semver:
      range: '>=4.0.0 <5.0.0'
---
