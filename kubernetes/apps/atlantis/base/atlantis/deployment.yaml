apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlantis
  namespace: automation
  labels:
    app: atlantis
spec:
  replicas: 1
  # Single replica pinned to type=pi (ff-pi1) which doesn't have headroom
  # for two atlantis pods simultaneously. Default RollingUpdate keeps old
  # pod up until new is Ready and starves on
  #   "0/2 nodes available: 1 Insufficient cpu/memory,
  #   1 didn't match node affinity/selector"
  # Recreate: kill old → start new. Brief outage (seconds during image
  # pull) is acceptable for a PR-only tool.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: atlantis
  template:
    metadata:
      labels:
        app: atlantis
    spec:
      serviceAccountName: atlantis
      securityContext:
        # Atlantis upstream image uses UID 100 / GID 1000 for the atlantis user.
        # Be explicit so a kubelet that ignores image USER doesn't fall back to root.
        runAsUser: 100
        runAsGroup: 1000
        fsGroup: 1000
        # The PVC was first mounted long ago with different ownership; force k8s
        # to recursively chgrp the volume root on each pod start until it matches.
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        # The existing PVC has files owned by old UIDs (created before this
        # securityContext was set). fsGroup chgrp's but doesn't chown the existing
        # files — atlantis still can't *create* new entries because the dir itself
        # is owned by an alien user. This init container repairs ownership on
        # first run and is a no-op on every subsequent pod start: it stat's the
        # volume root and only walks the tree if owner != 100:1000.
        - name: fix-data-ownership
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              OWNER=$(stat -c '%u:%g' /atlantis-data)
              if [ "$OWNER" = "100:1000" ]; then
                echo "ownership already correct ($OWNER), skipping chown"
                exit 0
              fi
              echo "current owner $OWNER != 100:1000, repairing..."
              chown -R 100:1000 /atlantis-data
              chmod -R u+rwX,g+rwX /atlantis-data
              echo "done"
          securityContext:
            runAsUser: 0          # need root to chown
            runAsGroup: 0
            runAsNonRoot: false
          volumeMounts:
            - name: atlantis-data
              mountPath: /atlantis-data
        # Terragrunt isn't bundled in the runatlantis/atlantis image. Download
        # the binary into a shared emptyDir; the atlantis container picks it up
        # via PATH (see env: PATH on the main container). Re-runs on every pod
        # start — cheap (~25MB binary) and avoids maintaining a custom Docker
        # image. Architecture-aware so this works on both pi (arm64) and
        # vm1 (amd64) if nodeSelector ever changes.
        #
        # SHA256 is pinned per-architecture and verified before chmod+exec.
        # When bumping VERSION, also update both SHA256 values — pull them
        # from the matching release's SHA256SUMS file at
        # https://github.com/gruntwork-io/terragrunt/releases/download/<VERSION>/SHA256SUMS
        # The PR-review-time pairing is the supply-chain guard.
        - name: install-terragrunt
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              set -e
              VERSION=v1.0.5
              SHA256_ARM64=36dd76fe7f211aedf79920f6f1794eed22e7d7142fe969f4cfff5d863f6593f3
              SHA256_AMD64=729d59f7655e25e8db4abd73a422d002d80720ef1edbd2f4a03322e79e444101
              ARCH=$(uname -m)
              case "$ARCH" in
                aarch64|arm64) GOARCH=arm64; EXPECTED=$SHA256_ARM64 ;;
                x86_64|amd64)  GOARCH=amd64; EXPECTED=$SHA256_AMD64 ;;
                *) echo "unsupported arch: $ARCH" >&2; exit 1 ;;
              esac
              echo "downloading terragrunt $VERSION for linux/$GOARCH"
              wget -qO /tools/terragrunt \
                "https://github.com/gruntwork-io/terragrunt/releases/download/${VERSION}/terragrunt_linux_${GOARCH}"
              echo "verifying SHA256..."
              echo "${EXPECTED}  /tools/terragrunt" | sha256sum -c -
              chmod 0755 /tools/terragrunt
              /tools/terragrunt --version
          volumeMounts:
            - name: tools
              mountPath: /tools
      containers:
        - name: atlantis
          image: ghcr.io/runatlantis/atlantis:v0.43.0
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          env:
            # /tools is populated by the install-terragrunt initContainer and
            # mounted below; prepending it to PATH so `terragrunt` resolves in
            # workflow shells. The rest mirrors the image's default PATH.
            - name: PATH
              value: "/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: ATLANTIS_REPO_ALLOWLIST
              value: "github.com/CalebSargeant/infra"
            # GitHub App auth (replaces ATLANTIS_GH_USER/_TOKEN PAT flow).
            # The App ID and PEM key come from the Secret 'atlantis' which is
            # materialized by externalsecret.yaml pulling from OCI Vault.
            - name: ATLANTIS_GH_APP_ID
              valueFrom:
                secretKeyRef:
                  name: atlantis
                  key: app-id
            - name: ATLANTIS_GH_APP_KEY_FILE
              value: /etc/atlantis/github-app/private-key.pem
            - name: ATLANTIS_GH_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: atlantis
                  key: webhook-secret
            # Required when using GitHub App auth — Atlantis writes a temporary
            # git credentials file to /home/atlantis/.git-credentials so `git clone`
            # via the App installation token works. Without this flag the server
            # refuses to start: "Github App requires --write-git-creds to support cloning".
            - name: ATLANTIS_WRITE_GIT_CREDS
              value: "true"
            - name: ATLANTIS_PORT
              value: "4141"
            - name: ATLANTIS_ATLANTIS_URL
              value: "https://atlantis.sargeant.co"
            - name: ATLANTIS_DATA_DIR
              value: "/atlantis-data"
            - name: ATLANTIS_REPO_CONFIG_JSON
              valueFrom:
                configMapKeyRef:
                  name: atlantis-config
                  key: repos.json
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: atlantis-aws
                  key: access-key-id
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: atlantis-aws
                  key: secret-access-key
                  optional: true
            - name: AWS_REGION
              value: "us-east-1"
            - name: ARM_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: atlantis-azure
                  key: client-id
                  optional: true
            - name: ARM_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: atlantis-azure
                  key: client-secret
                  optional: true
            - name: ARM_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: atlantis-azure
                  key: tenant-id
                  optional: true
            - name: ARM_SUBSCRIPTION_ID
              valueFrom:
                secretKeyRef:
                  name: atlantis-azure
                  key: subscription-id
                  optional: true
          ports:
            - name: atlantis
              containerPort: 4141
          volumeMounts:
            - name: atlantis-data
              mountPath: /atlantis-data
            - name: github-app-key
              mountPath: /etc/atlantis/github-app
              readOnly: true
            - name: tools
              mountPath: /tools
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4141
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4141
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: atlantis-data
          persistentVolumeClaim:
            claimName: atlantis
        # Populated by install-terragrunt initContainer at pod start, consumed
        # by atlantis container (read-only mount above).
        - name: tools
          emptyDir: {}
        - name: github-app-key
          secret:
            secretName: atlantis
            items:
              - key: app-key-pem
                path: private-key.pem
            # 0440 (group-readable) so the atlantis container user can read it
            # via fsGroup: 1000 (set at the pod securityContext). Not 0400 —
            # that's owner-only and the container runs non-root.
            defaultMode: 0440
