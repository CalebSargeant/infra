---
# UI (Vue SPA, nginx). The browser then calls the apiserver directly at the
# apiBaseUrl host below — hence a second, separate Ingress for the API.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dependency-track-frontend
  namespace: security
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-dns
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/target: 7694eb38-c35e-4905-bd2b-16ab7053080a.cfargotunnel.com
    traefik.ingress.kubernetes.io/service.serversscheme: http
    traefik.ingress.kubernetes.io/entrypoints: websecure
  labels:
    app: dependency-track
    app.kubernetes.io/component: frontend
spec:
  rules:
    - host: dependencytrack.magmamoose.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dependency-track-frontend
                port:
                  number: 8080
  tls:
    - hosts:
        - dependencytrack.magmamoose.com
      secretName: dependency-track-tls
---
# REST API + health endpoints. frontend.apiBaseUrl points here.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dependency-track-api
  namespace: security
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-dns
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/target: 7694eb38-c35e-4905-bd2b-16ab7053080a.cfargotunnel.com
    traefik.ingress.kubernetes.io/service.serversscheme: http
    traefik.ingress.kubernetes.io/entrypoints: websecure
  labels:
    app: dependency-track
    app.kubernetes.io/component: apiserver
spec:
  rules:
    - host: dependencytrack-api.magmamoose.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dependency-track-api-server
                port:
                  number: 8080
  tls:
    - hosts:
        - dependencytrack-api.magmamoose.com
      secretName: dependency-track-api-tls
