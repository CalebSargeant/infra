apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: homeassistant
  namespace: automation
spec:
  selector:
    matchLabels:
      app: homeassistant
  template:
    metadata:
      labels:
        app: homeassistant
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet # Adjust DNS policy when using host networking
      # fsGroup 1000 makes the dynamic Longhorn volume writable by HA's internal
      # (non-root) process — a fresh PV mounts root:root, unlike the old hostPath.
      securityContext:
        fsGroup: 1000
      containers:
        - name: homeassistant
          image: ghcr.io/home-assistant/home-assistant:stable
          resources:
            requests:
              memory: "612Mi"
              cpu: "10m"
            limits:
              memory: "612Mi"
          ports:
            - containerPort: 8123 # Home Assistant web UI
          env:
            - name: TZ
              value: "Europe/Amsterdam" # Adjust timezone
            # Recorder DB connection string — sourced from OCI Vault via the
            # homeassistant ExternalSecret (Secret homeassistant-recorder).
            # configuration.yaml reads it through `!env_var RECORDER_DB_URL`.
            - name: RECORDER_DB_URL
              valueFrom:
                secretKeyRef:
                  name: homeassistant-recorder
                  key: RECORDER_DB_URL
          volumeMounts:
            - mountPath: /config
              name: homeassistant-config
            - mountPath: /config/configuration.yaml
              name: homeassistant-main-config
              subPath: configuration.yaml
      volumes:
        - name: homeassistant-config
          persistentVolumeClaim:
            claimName: homeassistant
        - name: homeassistant-main-config
          configMap:
            name: homeassistant-config
