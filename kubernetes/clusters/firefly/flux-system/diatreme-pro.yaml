---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: diatreme-pro
  namespace: flux-system
spec:
  image: ghcr.io/calebsargeant/diatreme-pro
  interval: 5m
  provider: generic
  secretRef:
    name: ghcr-pull-secret
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: diatreme-pro
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: diatreme-pro
  filterTags:
    pattern: '^v[0-9]+\.[0-9]+\.[0-9]+$'
    extract: '$0'
  policy:
    semver:
      range: '>=0.1.0'
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: diatreme-pro
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: diatreme-pro
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: actions@users.noreply.github.com
        name: Flux Bot
      messageTemplate: |-
        chore: update diatreme-pro image
        {{range .Changed.Changes}}{{print .OldValue}} -> {{println .NewValue}}{{end}}

        [ci skip]
    push:
      branch: main
  update:
    path: "./k8s/overlays/prod"
    strategy: Setters
