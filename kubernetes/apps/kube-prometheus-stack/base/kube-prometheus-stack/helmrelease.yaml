apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: observability
  labels:
    app.kubernetes.io/name: kube-prometheus-stack
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "68.2.2"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: true
    crds: CreateReplace
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    # Skip helm's wait — 3 nodes are NotReady so prometheus pods can't all schedule,
    # and `helm upgrade` waits on them until the 15m deadline. Flux's Kustomization
    # health check on the HelmRelease itself is enough.
    disableWait: true
    # Without this, a failed upgrade leaves the release "pending-upgrade" and blocks
    # all subsequent reconciles (see history: v7–v10 all stuck since 2026-02-15).
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    # Global settings
    fullnameOverride: prometheus
    
    # Prometheus configuration
    prometheus:
      prometheusSpec:
        # Affinity to run on mini nodes only
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: node-role.kubernetes.io/mini
                  operator: Exists
        
        # External labels for Thanos
        externalLabels:
          cluster: firefly
          replica: $(POD_NAME)
        
        # Retention settings (short-term, Thanos handles long-term)
        retention: 7d
        retentionSize: "45GB"
        
        # Storage
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 50Gi
        
        # Resource requests/limits — sized from the KRR report (Prometheus uses
        # ~1.7Gi / ~150m here, was over-provisioned at 8Gi/2 cores). No CPU limit
        # (KRR rec: cpu limit -> unset) to avoid CFS throttling on the 16-core
        # ff-vm1 node; memory limit keeps headroom above observed usage.
        resources:
          requests:
            cpu: 250m
            memory: 2Gi
          limits:
            memory: 3Gi
        
        # Thanos sidecar configuration
        thanos:
          image: quay.io/thanos/thanos:v0.37.2
          version: v0.37.2
          # Chart 68.2.2 expects the `existingSecret` form here; the flat name/key
          # form is silently dropped by the chart, leaving the Prometheus CR with no
          # objectStorageConfig and the sidecar logging "uploads will be disabled".
          objectStorageConfig:
            existingSecret:
              name: thanos-objstore-config
              key: objstore.yml
          resources:
            requests:
              cpu: 10m
              memory: 100Mi
            limits:
              memory: 256Mi
        
        # Selectors — discover ServiceMonitors/PodMonitors/Rules/Probes across all
        # namespaces without requiring a release label (lets the blackbox Probe work).
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        
      # Thanos service for sidecar
      thanosService:
        enabled: true
        type: ClusterIP
        port: 10901
      
      # Ingress for Prometheus (optional)
      ingress:
        enabled: false
    
    # Grafana configuration
    grafana:
      enabled: true
      # Admin credentials from OCI Vault via ExternalSecret grafana-admin-credentials.
      admin:
        existingSecret: grafana-admin-credentials
        userKey: admin-user
        passwordKey: admin-password
      
      # Pin Grafana to ff-pi1, where its existing local-path PV is node-affined.
      # Pinning the pod here resolves the rollout deadlock (old pod held the RWO
      # PV on ff-pi1 while the new pod was forced onto ff-vm1 and stayed Pending).
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: type
                operator: In
                values:
                - pi
      # Recreate so the old pod releases the RWO PVC before the new one starts.
      deploymentStrategy:
        type: Recreate

      # Persistence
      persistence:
        enabled: true
        size: 10Gi
      
      # Resources — no CPU limit (avoid CFS throttling); modest memory footprint.
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
      
      # Datasources
      additionalDataSources:
        - name: Thanos
          type: prometheus
          url: http://thanos-query:9090
          access: proxy
          isDefault: true
          jsonData:
            timeInterval: 30s
        - name: Loki
          type: loki
          url: http://loki-gateway
          access: proxy
          isDefault: false
          jsonData:
            maxLines: 1000
      
      # Dashboard providers
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: 'default'
              orgId: 1
              folder: ''
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default
      
      # Ingress for Grafana — LAN exposure via Traefik, same pattern as
      # radarr.sargeant.co (cert-manager letsencrypt-dns, websecure).
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-dns
          traefik.ingress.kubernetes.io/service.serversscheme: http
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
        hosts:
          - grafana.sargeant.co
          - grafana.sargeant.local
        tls:
          - hosts:
              - grafana.sargeant.co
            secretName: grafana-tls

      # Sidecar for loading dashboards
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
          resources:
            requests:
              cpu: 10m
              memory: 124Mi
            limits:
              memory: 192Mi
        datasources:
          enabled: true
          # Suppress the chart's built-in Prometheus datasource entirely (this knob
          # gates its emission) so the additionalDataSources "Thanos" (isDefault: true)
          # is the only datasource AND the sole org default. Two defaults crashloop
          # Grafana: "Only one datasource per organization can be marked as default".
          defaultDatasourceEnabled: false
          searchNamespace: ALL
          resources:
            requests:
              cpu: 10m
              memory: 121Mi
            limits:
              memory: 192Mi

    # AlertManager configuration
    alertmanager:
      enabled: true
      # Route critical alerts (incl. CNPG backup failures) to Slack #engineering-alerts.
      # Uses the bot token mounted from the slack-bot-token secret (alertmanagerSpec.secrets)
      # via credentials_file, posting through chat.postMessage to channel C0A9FT7355Z.
      config:
        global:
          resolve_timeout: 5m
        route:
          receiver: "null"
          group_by: ["namespace", "alertname"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          routes:
            - receiver: slack-critical
              matchers:
                - 'severity="critical"'
              continue: true
            - receiver: slack-critical
              matchers:
                - 'alertname=~"CNPGBackup.*"'
        receivers:
          - name: "null"
          - name: slack-critical
            slack_configs:
              - api_url: https://slack.com/api/chat.postMessage
                channel: "C0A9FT7355Z"
                send_resolved: true
                http_config:
                  authorization:
                    type: Bearer
                    credentials_file: /etc/alertmanager/secrets/slack-bot-token/token
                title: '{{ if eq .Status "firing" }}:red_circle:{{ else }}:white_check_mark:{{ end }} {{ .CommonLabels.alertname }}{{ with .CommonLabels.namespace }} ({{ . }}){{ end }}'
                text: |-
                  {{ range .Alerts }}*{{ .Annotations.summary }}*
                  {{ .Annotations.description }}
                  {{ end }}
      alertmanagerSpec:
        # Slack bot token (from OCI Vault via ExternalSecret) mounted at
        # /etc/alertmanager/secrets/slack-bot-token/token
        secrets:
          - slack-bot-token
        # Affinity to run on mini nodes only
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: node-role.kubernetes.io/mini
                  operator: Exists
        
        storage:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 5Gi
        
        resources:
          requests:
            cpu: 10m
            memory: 100Mi
          limits:
            memory: 100Mi

      ingress:
        enabled: false
    
    # Prometheus Operator
    prometheusOperator:
      # Stateless observability controller — schedule on a worker, not the Pi
      # (the node-selectors/mini kustomize component can't reach Helm-rendered pods).
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      resources:
        requests:
          cpu: 10m
          memory: 100Mi
        limits:
          memory: 100Mi

    # Node Exporter
    nodeExporter:
      enabled: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node.kubernetes.io/unreachable
                operator: DoesNotExist
    
    # Node Exporter resources
    prometheus-node-exporter:
      resources:
        requests:
          cpu: 10m
          memory: 100Mi
        limits:
          memory: 100Mi

    # Kube State Metrics
    kubeStateMetrics:
      enabled: true
    
    # Kube State Metrics resources
    kube-state-metrics:
      # Stateless observability component — schedule on a worker, not the Pi.
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      resources:
        requests:
          cpu: 10m
          memory: 100Mi
        limits:
          memory: 100Mi

    # Default rules and alerts
    defaultRules:
      create: true
      rules:
        alertmanager: true
        etcd: true
        configReloaders: true
        general: true
        k8s: true
        kubeApiserver: true
        kubeApiserverAvailability: true
        kubeApiserverSlos: true
        kubelet: true
        kubeProxy: true
        kubePrometheusGeneral: true
        kubePrometheusNodeRecording: true
        kubernetesApps: true
        kubernetesResources: true
        kubernetesStorage: true
        kubernetesSystem: true
        kubeScheduler: true
        kubeStateMetrics: true
        network: true
        node: true
        nodeExporterAlerting: true
        nodeExporterRecording: true
        prometheus: true
        prometheusOperator: true
