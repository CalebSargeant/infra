apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: safe-settings
  namespace: security
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-dns
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/target: 7694eb38-c35e-4905-bd2b-16ab7053080a.cfargotunnel.com
    traefik.ingress.kubernetes.io/service.serversscheme: http
    traefik.ingress.kubernetes.io/entrypoints: websecure
  labels:
    app: safe-settings
spec:
  # NOTE: GitHub delivers webhooks to https://safesettings.magmamoose.com/api/github/webhooks
  # — the magmamoose.com host must be published through the Cloudflare tunnel
  # for GitHub's delivery IPs to reach it. .sargeant.local is internal-only.
  rules:
    - host: safesettings.magmamoose.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: safe-settings
                port:
                  number: 3000
    - host: safe-settings.sargeant.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: safe-settings
                port:
                  number: 3000
  tls:
    - hosts:
        - safesettings.magmamoose.com
      secretName: safe-settings-tls
