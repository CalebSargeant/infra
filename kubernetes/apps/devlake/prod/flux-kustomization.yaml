---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prod-devlake
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps/devlake/base
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 10m
  wait: true
  # Needs external-secrets (OCI Vault) up first for the encryption key.
  dependsOn:
    - name: infrastructure-services
