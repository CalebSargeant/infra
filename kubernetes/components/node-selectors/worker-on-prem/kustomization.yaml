apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# "worker-on-prem" = the on-prem worker only (ff-vm1). Selects the worker role
# AND the on-prem tier, so storage-bound workloads (Longhorn/NFS/hostPath data
# that lives on ff-vm1) and on-prem-coupled apps stay put and do NOT drift onto
# the cloud-worker tier. Use this instead of bare `worker` once the cloud
# workers exist. See docs/reference/cluster-topology.md.
patches:
  - target:
      kind: Deployment
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node-role.kubernetes.io/worker: ""
          topology.sargeant.co/tier: on-prem

  - target:
      kind: StatefulSet
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node-role.kubernetes.io/worker: ""
          topology.sargeant.co/tier: on-prem

  - target:
      kind: DaemonSet
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          node-role.kubernetes.io/worker: ""
          topology.sargeant.co/tier: on-prem

  - target:
      kind: CronJob
    patch: |
      - op: add
        path: /spec/jobTemplate/spec/template/spec/nodeSelector
        value:
          node-role.kubernetes.io/worker: ""
          topology.sargeant.co/tier: on-prem

  - target:
      kind: HelmRelease
    patch: |
      - op: add
        path: /spec/values/defaultPodOptions/nodeSelector
        value:
          node-role.kubernetes.io/worker: ""
          topology.sargeant.co/tier: on-prem
