apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dependency-track-oidc
  namespace: security
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: dependency-track-oidc
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # OIDC client id (public identifier — not a secret, but sourced from the
    # vault so it isn't hard-coded). Shared Google SSO client; both the
    # apiserver (token validation) and frontend (login) read it.
    - secretKey: client-id
      remoteRef:
        key: google-sso-oauth-client-id
