apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-credentials
  namespace: core
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: minio-credentials
    creationPolicy: Owner
  # Per-user MinIO passwords sourced from OCI Vault (single source of truth).
  # Consumed by the MinIO StatefulSet (root) and the minio-setup Job (per-user).
  # Values match the existing MinIO users, so no user/password reset is required.
  data:
    - secretKey: root-password
      remoteRef:
        key: minio-root-password
    - secretKey: thanos-password
      remoteRef:
        key: minio-thanos-password
    - secretKey: loki-password
      remoteRef:
        key: minio-loki-password
    - secretKey: postgres-password
      remoteRef:
        key: minio-postgres-password
    - secretKey: backup-password
      remoteRef:
        key: minio-backup-password
