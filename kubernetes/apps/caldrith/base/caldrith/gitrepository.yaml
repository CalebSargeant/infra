---
# Source for the external MagmaMoose/caldrith repo (the Caldrith webhook-service
# manifests live there under ./k8s/overlays/prod, with image automation).
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: caldrith
  namespace: flux-system
spec:
  interval: 10m
  provider: github
  ref:
    branch: main
  secretRef:
    # magmamoose-org repo; uses the MagmaMoose-org App installation (see
    # ../../../clusters/firefly/flux-system/github-app-magmamoose-secret.yaml),
    # same as diatreme-pro and zoey. caldrith is public, so this is for
    # consistency / rate-limit headroom, not strictly required for read access.
    name: github-app-magmamoose
  url: https://github.com/magmamoose/caldrith
