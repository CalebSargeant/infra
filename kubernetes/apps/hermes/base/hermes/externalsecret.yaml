apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hermes
  namespace: automation
spec:
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: hermes
    creationPolicy: Owner
    template:
      type: Opaque
  # NOTE: remoteRef keys keep their original `openclaw-*` names — the OCI Vault
  # entries hold the same still-valid bots/tokens (Telegram, Slack, HA) and reused
  # secrets (LiteLLM master key). Renaming the vault entries themselves is a
  # separate manual step and is intentionally out of scope for this app swap.
  data:
    # Reused as the API server bearer (API_SERVER_KEY) AND the dashboard basic-auth
    # password + HMAC session secret. Single-user LAN, so one value is fine.
    - secretKey: gateway-token
      remoteRef:
        key: openclaw-gateway-token
    # LiteLLM gateway master key — Hermes' OpenAI-compatible credential (OPENAI_API_KEY).
    - secretKey: litellm-api-key
      remoteRef:
        key: litellm-master-key
    # Telegram bot token (@NievahBot) — consumed as env TELEGRAM_BOT_TOKEN.
    - secretKey: telegram-bot-token
      remoteRef:
        key: openclaw-telegram-bot-token
    # Home Assistant MCP long-lived access token — consumed as env HA_MCP_TOKEN.
    - secretKey: ha-mcp-token
      remoteRef:
        key: openclaw-homeassistant-mcp-token
    # In-cluster n8n MCP app-layer bearer (shared with the n8n-mcp app) — consumed
    # as env N8N_MCP_AUTH_TOKEN.
    - secretKey: n8n-mcp-auth-token
      remoteRef:
        key: n8n-mcp-auth-token
    # Slack Socket Mode — bot token (xoxb) + app-level token (xapp).
    - secretKey: slack-bot-token
      remoteRef:
        key: openclaw-slack-bot-token
    - secretKey: slack-app-token
      remoteRef:
        key: slack-nievah-app-token
