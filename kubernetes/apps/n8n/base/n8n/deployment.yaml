apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: automation
spec:
  replicas: 1
  # Single replica on a ReadWriteOnce hostPath volume, pinned to the Pi
  # (nodeSelector type:pi). RollingUpdate would surge a second pod before
  # killing the old one, but the Pi can't fit two n8n pods (320Mi each) →
  # new pod stuck Pending, old pod never terminates, image bumps never roll
  # out. Recreate terminates the old pod first, freeing memory for the new.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      # fsGroup 1000 (node) makes the dynamic Longhorn volume writable by n8n's
      # non-root user — a fresh PV mounts root:root, unlike the old chowned
      # hostPath, so without this n8n CrashLoops on EACCES writing /home/node/.n8n.
      securityContext:
        fsGroup: 1000
      # n8n misparses the k8s-injected N8N_PORT=tcp://<svc-ip>:5678 service-link
      # env var; disable the Docker-style service links (n8n addresses by DNS).
      enableServiceLinks: false
      containers:
        - name: n8n
          image: n8nio/n8n:2.27.2 # {"$imagepolicy": "flux-system:n8n"}
          resources:
            # KRR ~277Mi working set. Raw values (no resource-profile component,
            # which would have overridden these up to c.small's 512Mi). 320Mi
            # request with 512Mi limit for workflow-execution spikes. No CPU limit.
            requests:
              memory: "320Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
          env:
            - name: DB_TYPE
              value: "postgresdb"
            - name: DB_POSTGRESDB_DATABASE
              value: "n8n"
            - name: DB_POSTGRESDB_HOST
              value: "postgres-rw.database.svc.cluster.local"
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_USER
              valueFrom:
                secretKeyRef:
                  name: n8n
                  key: postgres-username
            - name: DB_POSTGRESDB_SCHEMA
              value: "public"
            - name: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
              value: "false"
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  # Single source of truth: ExternalSecret n8n-db ← OCI Vault
                  # neondb-owner-password (the same value CNPG enforces on the
                  # neondb_owner role). The SOPS `n8n` secret's postgres-password
                  # key is now unused — kept only until it can be scrubbed.
                  name: n8n-db
                  key: password
            - name: N8N_BASIC_AUTH_ACTIVE
              value: "true"
            - name: N8N_BASIC_AUTH_USER
              value: "admin"
            - name: WEBHOOK_URL
              value: "https://n8n.sargeant.co"
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n
                  key: encryption-key
            - name: N8N_RUNNERS_ENABLED
              value: "true"
          volumeMounts:
            - name: n8n
              mountPath: /home/node/.n8n
      volumes:
        - name: n8n
          persistentVolumeClaim:
            claimName: n8n
