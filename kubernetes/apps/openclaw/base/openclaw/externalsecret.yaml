apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openclaw
  namespace: automation
spec:
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: openclaw
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # Gateway auth token — required by `gateway --auth token`; this is what you
    # enter in the Control UI at https://openclaw.sargeant.co.
    - secretKey: gateway-token
      remoteRef:
        key: openclaw-gateway-token
    # LiteLLM gateway key the assistant uses to reach claude-sonnet-4-6. Reuses
    # the existing LiteLLM master key (no new vault entry).
    - secretKey: litellm-api-key
      remoteRef:
        key: litellm-master-key
    # OpenAI API key — enables semantic (vector) memory embeddings, and later
    # OpenAI voice-note transcription (STT). Reuses the existing vault secret.
    - secretKey: openai-api-key
      remoteRef:
        key: openai-api-key
    # Telegram bot token (@NievahBot) — consumed as env TELEGRAM_BOT_TOKEN.
    - secretKey: telegram-bot-token
      remoteRef:
        key: openclaw-telegram-bot-token
    # Home Assistant MCP long-lived access token — consumed as env HA_MCP_TOKEN.
    - secretKey: ha-mcp-token
      remoteRef:
        key: openclaw-homeassistant-mcp-token
    # Shared Browserless token — substituted into the browser profile cdpUrl.
    - secretKey: browserless-token
      remoteRef:
        key: browserless-token
