# Shared Flux cluster config — HelmRepository sources, registry/Git auth
# secrets, and notification Providers/Alerts. Relocated out of
# clusters/firefly/flux-system/ to keep that directory bootstrap-only
# (gotk-components + gotk-sync + kustomization).
#
# IMPORTANT: this stack is applied by the *bootstrap* `flux-system`
# Kustomization (referenced from clusters/firefly/flux-system/kustomization.yaml),
# NOT by an infrastructure-tier Kustomization. It is intentionally NOT listed in
# infrastructure/kustomization.yaml — that file feeds the meta `apps` Kustomization,
# and listing it there would double-manage these objects. Keep it out.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - helmrepositories.yaml
  - ghcr-pull-secret.yaml
  - github-app-secret.yaml
  - github-app-magmamoose-secret.yaml
  - notifications.yaml
