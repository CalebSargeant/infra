apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb
  namespace: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # Longhorn (replicated, node-independent) so MariaDB runs on the worker
  # instead of being pinned to ff-pi1's local /mnt/nvme/mariadb. The ~189M
  # datadir is copied over (mariadb scaled to 0) before cutover.
  storageClassName: longhorn
