apiVersion: batch/v1
kind: CronJob
metadata:
  name: sonarqube-defectdojo-sync
  # ResourceQuota/LimitRange are namespace-scoped policies owned elsewhere, not
  # set per-CronJob (house convention; same as the grandfathered dt-sync).
  # kics-scan ignore-line
  namespace: security
spec:
  # Hourly, offset 30m from dt-defectdojo-sync. Reimport dedups, so re-runs are
  # cheap + idempotent.
  schedule: "30 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: sonarqube-defectdojo-sync
          annotations:
            # Confine the container with the runtime's default AppArmor profile.
            container.apparmor.security.beta.kubernetes.io/sync: runtime/default
        spec:
          restartPolicy: Never
          # The sync talks only to in-cluster HTTP + Postgres; it never calls the
          # Kubernetes API, so it needs no ServiceAccount token mounted.
          automountServiceAccountToken: false
          # Heavy app pods live on the worker node (house convention).
          nodeSelector:
            node-role.kubernetes.io/worker: ""
          securityContext:
            runAsNonRoot: true
            # High, fixed UID/GID (>10000) — the container runs `python` directly
            # (entrypoint overridden), so it needs no image-baked user.
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: sync
              # Pin matches the DefectDojo chart appVersion (2.58.4) so the ORM
              # matches the running schema — bump together on chart upgrades. Tag
              # (not digest) + IfNotPresent is the house convention (same as dt-sync).
              # kics-scan ignore-line
              image: defectdojo/defectdojo-django:2.58.4
              # kics-scan ignore-line
              imagePullPolicy: IfNotPresent
              command: ["python", "/scripts/sync.py"]
              # `dojo` package is at /app (image WORKDIR) — put it on the path so
              # django.setup() can import it from a /scripts script.
              workingDir: /app
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: [ALL]
                seccompProfile:
                  type: RuntimeDefault
              env:
                - name: PYTHONPATH
                  value: /app
                # readOnlyRootFilesystem: don't write .pyc, keep tmp on the emptyDir.
                - name: PYTHONDONTWRITEBYTECODE
                  value: "1"
                - name: TMPDIR
                  value: /tmp
                - name: DJANGO_SETTINGS_MODULE
                  value: dojo.settings.settings
                # In-cluster service endpoints (no Cloudflare round-trip).
                - name: DEFECTDOJO_URL
                  value: http://defectdojo-django.security.svc.cluster.local # NOSONAR S5332 - in-cluster east-west; TLS terminates at the tunnel, not the pod network (same as dt-sync)
                - name: SONARQUBE_URL
                  value: http://sonarqube-sonarqube.security.svc.cluster.local:9000 # NOSONAR S5332 - in-cluster east-west; TLS terminates at the tunnel, not the pod network
                # ── DefectDojo DB connection for the ORM (mirror the chart) ──
                - name: DD_DATABASE_ENGINE
                  value: django.db.backends.postgresql
                - name: DD_DATABASE_HOST
                  value: postgres-rw.database.svc.cluster.local
                - name: DD_DATABASE_PORT
                  value: "5432"
                - name: DD_DATABASE_NAME
                  value: defectdojo
                - name: DD_DATABASE_USER
                  value: neondb_owner
                - name: DD_DATABASE_PASSWORD
                  valueFrom:
                    # secretKeyRef is the secure K8s pattern for secret injection.
                    # kics-scan ignore-line
                    secretKeyRef:
                      name: defectdojo-postgresql-specific
                      key: postgresql-password
                - name: DD_SECRET_KEY
                  valueFrom:
                    # kics-scan ignore-line
                    secretKeyRef:
                      name: defectdojo
                      key: DD_SECRET_KEY
                - name: DD_CREDENTIAL_AES_256_KEY
                  valueFrom:
                    # kics-scan ignore-line
                    secretKeyRef:
                      name: defectdojo
                      key: DD_CREDENTIAL_AES_256_KEY
                # SonarQube token (user token with "Execute Analysis"/browse rights).
                # optional: lets the job start and exit cleanly (script logs
                # "SONARQUBE_TOKEN is empty; aborting") before the OCI Vault key
                # exists, instead of failing pods with CreateContainerConfigError.
                - name: SONARQUBE_TOKEN
                  valueFrom:
                    # kics-scan ignore-line
                    secretKeyRef:
                      name: security-integrations
                      key: SONARQUBE_TOKEN
                      optional: true
              volumeMounts:
                - name: sync-script
                  mountPath: /scripts
                  readOnly: true
                # Writable scratch for readOnlyRootFilesystem (requests/urllib temp).
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                # CPU limit omitted by house convention (throttling a short batch
                # sync hurts more than it helps).
                # kics-scan ignore-line
                limits:
                  memory: 1Gi
          volumes:
            - name: sync-script
              configMap:
                name: sonarqube-defectdojo-sync
                defaultMode: 0555
            - name: tmp
              emptyDir: {}
