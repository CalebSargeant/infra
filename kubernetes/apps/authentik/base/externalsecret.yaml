apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: authentik
    creationPolicy: Owner
  # The chart consumes this secret as `authentik.existingSecret` (env-injected into
  # both server + worker), so the keys MUST be the AUTHENTIK_* env-var names.
  data:
    # 50+ char random app secret. PREREQUISITE in OCI Vault:
    #   openssl rand -base64 60 | tr -d '\n'
    - secretKey: AUTHENTIK_SECRET_KEY
      remoteRef:
        key: authentik-secret-key
    # Shared CNPG `neondb_owner` password (reused).
    - secretKey: AUTHENTIK_POSTGRESQL__PASSWORD
      remoteRef:
        key: neondb-owner-password
    # Initial `akadmin` password (first boot only). PREREQUISITE in OCI Vault.
    - secretKey: AUTHENTIK_BOOTSTRAP_PASSWORD
      remoteRef:
        key: authentik-bootstrap-password
    # Initial API token for akadmin. PREREQUISITE in OCI Vault.
    - secretKey: AUTHENTIK_BOOTSTRAP_TOKEN
      remoteRef:
        key: authentik-bootstrap-token
