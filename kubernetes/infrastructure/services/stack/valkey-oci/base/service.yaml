apiVersion: v1
kind: Service
metadata:
  name: valkey-oci
  namespace: database
spec:
  selector:
    app: valkey-oci
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  # Headless — governs the StatefulSet; clients resolve
  # valkey-oci.database.svc.cluster.local to the single pod.
  clusterIP: None
