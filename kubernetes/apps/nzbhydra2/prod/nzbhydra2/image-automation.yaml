---
# Image-update automation for nzbhydra2, colocated with its Flux Kustomization.
# ImageRepository scans the registry; ImagePolicy selects the newest tag in the
# current major; ImageUpdateAutomation rewrites the $imagepolicy-marked tag under
# this app dir and pushes the bump to main. All flux-system-namespaced (rendered
# by the meta `apps` Kustomization, same as flux-kustomization.yaml).
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: nzbhydra2
  namespace: flux-system
spec:
  image: linuxserver/nzbhydra2
  interval: 1h
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: nzbhydra2
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: nzbhydra2
  filterTags:
    pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
    extract: '$0'
  policy:
    semver:
      range: '>=8.0.0 <9.0.0'
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: nzbhydra2
  namespace: flux-system
spec:
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: actions@users.noreply.github.com
        name: Flux Bot
      messageTemplate: |-
        chore(nzbhydra2): bump image tag
        {{range .Changed.Changes}}{{print .OldValue}} -> {{println .NewValue}}{{end}}

        [ci skip]
    push:
      branch: main
  update:
    path: "./kubernetes/apps/nzbhydra2"
    strategy: Setters
