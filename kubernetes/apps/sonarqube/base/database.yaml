---
# Empty database on the SHARED CNPG cluster (COMMON_MISTAKES #3: do NOT create a
# new Cluster). SonarQube creates + migrates its own schema on first boot, so it
# only needs an empty database it owns. Owned by the shared `neondb_owner` role
# (password enforced by CNPG from OCI Vault `neondb-owner-password`, surfaced to
# SonarQube via externalsecret-db.yaml).
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: sonarqube
  namespace: database
spec:
  cluster:
    name: postgres
  name: sonarqube
  owner: neondb_owner
  # Keep the database if this CR is ever pruned/deleted.
  databaseReclaimPolicy: retain
