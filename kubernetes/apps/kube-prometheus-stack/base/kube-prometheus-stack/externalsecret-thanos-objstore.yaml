apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: thanos-objstore-config
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: thanos-objstore-config
    creationPolicy: Owner
    # Render the Thanos objstore.yml, injecting the real MinIO `thanos` user
    # password from OCI Vault. Replaces the old SOPS secret whose placeholder
    # secret_key did not match MinIO (SignatureDoesNotMatch -> 0-object bucket).
    template:
      engineVersion: v2
      type: Opaque
      data:
        # `| quote` escapes any YAML-special chars in the password (the vault
        # value must still avoid embedding a literal " or \). Thanos sidecar,
        # store and compactor all parse this objstore.yml.
        objstore.yml: |
          type: s3
          config:
            bucket: thanos-metrics
            endpoint: minio.core.svc.cluster.local:9000
            access_key: thanos
            secret_key: {{ .thanosPassword | quote }}
            insecure: true
  data:
    - secretKey: thanosPassword
      remoteRef:
        key: minio-thanos-password
