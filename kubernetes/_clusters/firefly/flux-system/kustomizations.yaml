---
# Secrets come from OCI Vault (ExternalSecret) and 1Password Connect
# (OnePasswordItem); no SOPS-encrypted resources in this overlay.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: comment-commander
  namespace: flux-system
spec:
  interval: 10m
  path: ./k8s/overlays/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: comment-commander
    namespace: flux-system
  timeout: 5m
  wait: true
  dependsOn:
    - name: core
---
# comment-commander-pro — web dashboard / observability frontend for
# comment-commander. Secret (CC_TRIGGER_TOKEN) comes from OCI Vault via
# ExternalSecret; reads comment-commander's in-cluster Service. No SOPS.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: comment-commander-pro
  namespace: flux-system
spec:
  interval: 10m
  path: ./k8s/overlays/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: comment-commander-pro
    namespace: flux-system
  timeout: 5m
  wait: true
  dependsOn:
    - name: core
---
# Zoey — DB secret is mirrored from CNPG's `postgres-app` and the ghcr pull
# secret is mirrored from flux-system, both via external-secrets' kubernetes
# provider. No SOPS-encrypted resources in this overlay.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: zoey
  namespace: flux-system
spec:
  interval: 10m
  path: ./k8s/overlays/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: zoey
    namespace: flux-system
  timeout: 5m
  wait: true
  dependsOn:
    - name: core
    - name: database
---
# OpenViking — context database backing Zoey's MCP server. Its manifests live
# in the zoey repo under ./k8s-openviking (same GitRepository as `zoey`, just a
# different path), kept as a separate Kustomization so the context DB
# reconciles independently of the Zoey app. Secrets (OpenAI key, server root
# API key) come from OCI Vault via ExternalSecret. No SOPS-encrypted resources.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openviking
  namespace: flux-system
spec:
  interval: 10m
  path: ./k8s-openviking
  prune: true
  sourceRef:
    kind: GitRepository
    name: zoey
    namespace: flux-system
  timeout: 5m
  wait: true
  dependsOn:
    - name: core
---
# Phase 2: wraps the new infra-v2-style layout in kubernetes/clusters/firefly.
# Its output is just the per-app Flux Kustomization CRs (currently only
# prod-excalidraw, which is itself suspend: true). No app resources cross
# this Kustomization — those are applied by each per-app Flux Kustomization.
# Each per-app Kust must be unsuspended individually to actually take over
# from the corresponding entry in the legacy _clusters/firefly/<cat>/ path.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/clusters/firefly
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
