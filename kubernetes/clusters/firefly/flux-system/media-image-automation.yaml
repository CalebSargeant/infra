      range: '>=3.0.0 <4.0.0'
---
# Shared image update automation — Flux rewrites the `$imagepolicy`-marked tags
# under ./kubernetes/apps against the policies above and pushes the bump back to
# this infra repo's main branch. Requires the flux-system deploy key to have
# write access (Settings -> Deploy keys -> "Allow write access").
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: media
  namespace: flux-system
spec:
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: actions@users.noreply.github.com
        name: Flux Bot
      messageTemplate: |-
        chore(media): bump image tags
        {{range .Changed.Changes}}{{print .OldValue}} -> {{println .NewValue}}{{end}}

        [ci skip]
    push:
      branch: main
  update:
    path: "./kubernetes/apps"
    strategy: Setters
