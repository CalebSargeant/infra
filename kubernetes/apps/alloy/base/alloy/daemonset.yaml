apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  namespace: observability
  labels:
    app.kubernetes.io/name: alloy
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: alloy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alloy
    spec:
      serviceAccountName: alloy
      # ff-pi1 only — the amd64 node (ff-vm1) is covered by fluent-bit. Alloy is
      # the Go-based, 16KB-page-safe shipper for the Pi.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: type
                    operator: In
                    values:
                      - pi
      tolerations:
        - effect: NoSchedule
          operator: Exists
      containers:
        - name: alloy
          image: grafana/alloy:v1.5.1
          args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/var/lib/alloy/data
            - --server.http.listen-addr=0.0.0.0:12345
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: http
              containerPort: 12345
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
            - name: data
              mountPath: /var/lib/alloy/data
          resources:
            # ff-pi1 headroom was reclaimed by right-sizing its apps per KRR and
            # moving non-system workloads to the worker, so Alloy now carries a
            # real memory reservation (Burstable QoS, request < limit) instead of
            # the BestEffort `memory: "0"` it needed to schedule under pressure.
            requests:
              cpu: 20m
              memory: 128Mi
            limits:
              memory: 192Mi
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 12345
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: data
          emptyDir: {}
