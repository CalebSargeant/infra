apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      containers:
        - name: radarr
          image: linuxserver/radarr:5.28.0 # {"$imagepolicy": "flux-system:radarr"}
          resources:
            requests:
              # Right-sized: observed usage ~349Mi, request frees scheduling headroom.
              memory: "384Mi"
              cpu: "200m"
            limits:
              # Generous on purpose so we never OOM (limits don't affect scheduling).
              memory: "512Mi"
              cpu: "750m"
          ports:
            - containerPort: 7878 # Radarr web interface
          env:
            - name: PUID
              value: "1000" # Replace with your user ID
            - name: PGID
              value: "1000" # Replace with your group ID
            - name: TZ
              value: "Europe/Amsterdam" # Replace with your timezone
          volumeMounts:
            - mountPath: /config
              name: radarr
            - mountPath: /config/config.xml
              name: radarr-config
              subPath: config.xml
            - mountPath: /movies
              name: movies
            - mountPath: /downloads
              name: downloads
      volumes:
        - name: radarr
          persistentVolumeClaim:
            claimName: radarr
        - name: radarr-config
          configMap:
            name: radarr-config
        - name: movies
          persistentVolumeClaim:
            claimName: movies
        - name: downloads
          persistentVolumeClaim:
            claimName: downloads
