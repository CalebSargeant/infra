apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: automation
data:
  config.yaml: |
    # LiteLLM proxy for Diatreme Dispatch, configured for Claude Max-subscription
    # pass-through: the agent sends its Claude OAuth token (Authorization header),
    # which LiteLLM forwards upstream (forward_client_headers_to_llm_api) for
    # flat-rate subscription billing — so the Claude entries need NO api_key. The
    # gateway authenticates clients via the master key (x-litellm-api-key header).
    #
    # To put a model on per-token API billing instead, add
    #   api_key: os.environ/ANTHROPIC_API_KEY   (or DEEPSEEK_API_KEY)
    # to its entry and provide that key via the ExternalSecret + Deployment env.
    model_list:
      - model_name: claude-opus-4-8
        litellm_params:
          model: anthropic/claude-opus-4-8
        model_info:
          mode: chat
          base_model: anthropic/claude-opus-4-8
          auth_mode: claude-code-oauth-pass-through
          billing_mode: claude-max-subscription
          credential_source: client_authorization_header
          notes: "No Anthropic API key is configured; LiteLLM forwards the client's Claude Code OAuth bearer token upstream."
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: anthropic/claude-sonnet-4-6
        model_info:
          mode: chat
          base_model: anthropic/claude-sonnet-4-6
          auth_mode: claude-code-oauth-pass-through
          billing_mode: claude-max-subscription
          credential_source: client_authorization_header
          notes: "No Anthropic API key is configured; LiteLLM forwards the client's Claude Code OAuth bearer token upstream."
      - model_name: claude-haiku-4-5
        litellm_params:
          model: anthropic/claude-haiku-4-5
        model_info:
          mode: chat
          base_model: anthropic/claude-haiku-4-5
          auth_mode: claude-code-oauth-pass-through
          billing_mode: claude-max-subscription
          credential_source: client_authorization_header
          notes: "No Anthropic API key is configured; LiteLLM forwards the client's Claude Code OAuth bearer token upstream."
      - model_name: qwen2.5-coder-7b-instruct-local
        litellm_params:
          model: ollama_chat/qwen2.5-coder:7b-instruct-q4_K_M
          api_base: http://ollama-lan.automation.svc.cluster.local:11434
          api_key: os.environ/OLLAMA_LAN_API_KEY
          keep_alive: 30m
        model_info:
          mode: chat
          base_model: ollama_chat/qwen2.5-coder:7b-instruct-q4_K_M
          auth_mode: bearer-token-to-ollama-lan
          billing_mode: self-hosted
          credential_source: oci-vault:litellm-ollama-lan-api-key
          supports_function_calling: false
          supports_parallel_function_calling: false
          notes: "Self-hosted Ollama qwen2.5-coder model. LiteLLM exposes it through the OpenAI-compatible chat/completions API for clients such as Warp. Live probes show tool-call-shaped JSON in message content, not structured OpenAI tool_calls."
      # Agent-capable local model for Warp Agent Mode. Qwen3 emits native
      # structured tool_calls via Ollama's tools template, so unlike
      # qwen2.5-coder it can drive Warp's tool loop. qwen3:4b at q4 (~2.5GB)
      # fits the GTX 1060 6GB with headroom for the KV cache that Warp's large
      # agent prompts need. supports_function_calling MUST be true here, or
      # LiteLLM (with the global drop_params) strips the `tools` param and the
      # model never receives them.
      - model_name: qwen3-4b
        litellm_params:
          model: ollama_chat/qwen3:4b
          api_base: http://ollama-lan.automation.svc.cluster.local:11434
          api_key: os.environ/OLLAMA_LAN_API_KEY
          keep_alive: 30m
        model_info:
          mode: chat
          base_model: ollama_chat/qwen3:4b
          auth_mode: bearer-token-to-ollama-lan
          billing_mode: self-hosted
          credential_source: oci-vault:litellm-ollama-lan-api-key
          supports_function_calling: true
          supports_parallel_function_calling: false
          notes: "Self-hosted Ollama qwen3:4b. Tool-calling enabled for Warp Agent Mode (native tool_calls via Ollama's tools template). Sized for GTX 1060 6GB at q4."
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      # Forward the client's Authorization (the Claude OAuth token) to Anthropic.
      forward_client_headers_to_llm_api: true
      # Use a dedicated header for the proxy master key to avoid conflict with the Authorization header.
      litellm_key_header_name: x-litellm-api-key
    litellm_settings:
      # Forward provider-specific auth headers such as Claude's OAuth bearer token.
      forward_llm_provider_auth_headers: true
      drop_params: true
