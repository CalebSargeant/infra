apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cloudflared
  namespace: core
spec:
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      # cloudflared's QUIC transport wants ~7 MiB UDP receive buffer; default 208 KiB
      # causes silent packet loss and tunnel hangs (the pod stays Running with no log
      # output and no probe failure, so K8s can't self-heal). See
      # https://github.com/quic-go/quic-go/wiki/UDP-Buffer-Sizes.
      # net.core.{rmem,wmem}_max are netns-scoped on kernel 5.x+, so writing them
      # inside the pod's netns only affects this pod — not the host.
      initContainers:
        - name: tune-udp-buffers
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              echo 7500000 > /proc/sys/net/core/rmem_max &&
              echo 7500000 > /proc/sys/net/core/wmem_max
          securityContext:
            capabilities:
              drop: ["ALL"]
              add: ["NET_ADMIN"]
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - --protocol
            - quic
            - --metrics
            - 0.0.0.0:2000
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-token
                  key: token
          ports:
            - name: metrics
              containerPort: 2000
              protocol: TCP
          # cloudflared's /ready returns 200 once at least one tunnel connection is
          # registered. Without these probes the pod hung silently for 15h on 2026-05-23
          # — QUIC connections registered to Cloudflare's edge but couldn't move data,
          # and nothing told kubelet to restart it.
          livenessProbe:
            tcpSocket:
              port: 2000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "100Mi"
              cpu: "10m"
            limits:
              memory: "100Mi"
