---
# Image-update automation for flaresolverr, colocated with its Flux Kustomization.
# ImageRepository scans the registry; ImagePolicy selects the newest tag in the
# current major; ImageUpdateAutomation rewrites the $imagepolicy-marked tag under
# this app dir and pushes the bump to main. All flux-system-namespaced (rendered
# by the meta `apps` Kustomization, same as flux-kustomization.yaml).
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: flaresolverr
  namespace: flux-system
spec:
  image: ghcr.io/flaresolverr/flaresolverr
  interval: 1h
  provider: generic
  secretRef:
    name: ghcr-pull-secret
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: flaresolverr
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: flaresolverr
  filterTags:
    pattern: '^v[0-9]+\.[0-9]+\.[0-9]+$'
    extract: '$0'
  policy:
    semver:
      range: '>=3.0.0 <4.0.0'
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: flaresolverr
  namespace: flux-system
spec:
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: actions@users.noreply.github.com
        name: Flux Bot
      messageTemplate: |-
        chore(flaresolverr): bump image tag
        {{range .Changed.Changes}}{{print .OldValue}} -> {{println .NewValue}}{{end}}

        [ci skip]
    push:
      branch: main
  update:
    path: "./kubernetes/apps/flaresolverr"
    strategy: Setters
