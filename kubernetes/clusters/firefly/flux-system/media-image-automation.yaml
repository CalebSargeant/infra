---
# Image update automation for the media namespace apps.
#
# Pattern mirrors flux-system/zoey.yaml: a per-image ImageRepository +
# ImagePolicy (semver, current major held), plus one ImageUpdateAutomation
# that rewrites the `$imagepolicy`-marked tags under ./kubernetes/apps and
# pushes the bump to main. Markers live on each workload's `image:` line, e.g.
#   image: linuxserver/sonarr:4.0.15 # {"$imagepolicy": "flux-system:sonarr"}
#
# LinuxServer images publish a clean 3-part bare tag (e.g. 4.0.17) alongside
# noisier version-/-lsNNN/nightly/arch-prefixed variants; the ^x.y.z$ filter
# selects the bare tag and ignores the rest. flaresolverr uses vX.Y.Z.
#
# Docker Hub repos are scanned anonymously. If rate-limiting ever appears in the
# image-reflector-controller logs, add a Docker Hub PAT as a dockerconfigjson
# secret and set `secretRef` on those ImageRepositories.

# --- sonarr (linuxserver/sonarr) ---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: sonarr
  namespace: flux-system
spec:
  image: linuxserver/sonarr
  interval: 1h
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: sonarr
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: sonarr
  filterTags:
    pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
    extract: '$0'
  policy:
    semver:
      range: '>=4.0.0 <5.0.0'
---
# --- radarr (linuxserver/radarr) — held on 5.x; 6.x requires a manual bump ---
apiVersion: image.toolkit.fluxcd.io/v1beta2
