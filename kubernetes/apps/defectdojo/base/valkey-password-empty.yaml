apiVersion: v1
kind: Secret
metadata:
  name: defectdojo-valkey-specific
  namespace: security
  annotations:
    # DefectDojo's chart always reads this entry, even with bundled Valkey off.
    # The shared in-cluster Valkey service is intentionally authless, so the
    # broker password must exist but stay empty.
    kustomize.toolkit.fluxcd.io/prune: enabled
type: Opaque
stringData:
  valkey-password: ""
