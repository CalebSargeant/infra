apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: devlake
  namespace: devlake
spec:
  interval: 10m
  chart:
    spec:
      chart: devlake
      version: "1.0.2"
      sourceRef:
        kind: HelmRepository
        name: devlake
        namespace: flux-system
      interval: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # NOTE on the database: DevLake is MySQL-centric (its chart's Postgres path is
    # a commented secondary option and it does not support MariaDB), so it uses its
    # own bundled MySQL here — a deliberate exception to the shared-CNPG convention.
    # MySQL is ClusterIP-only (never exposed). Movable Longhorn volume.
    mysql:
      storage:
        class: longhorn
        size: 20Gi
      nodeSelector:
        node-role.kubernetes.io/worker: ""
    lake:
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      encryptionSecret:
        # Provided by the devlake-encryption ExternalSecret (OCI Vault) — not
        # auto-created, so it survives reinstalls and stays out of Git.
        secretName: devlake-encryption
        autoCreateSecret: false
    ui:
      nodeSelector:
        node-role.kubernetes.io/worker: ""
    grafana:
      # Pin to worker (mysql/lake/ui above are already pinned) — the grafana
      # subcomponent had no nodeSelector, so it floated onto the control-plane Pi.
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      persistence:
        enabled: true
        size: 4Gi
        storageClassName: longhorn
    # ClusterIP only — DevLake's config-ui has no auth by default, so it is NOT
    # publicly exposed here. Reach it with `kubectl -n devlake port-forward
    # svc/devlake-ui 4000:4000`. Gate behind Cloudflare Access before exposing.
    service:
      type: ClusterIP
    ingress:
      enabled: false
