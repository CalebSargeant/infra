apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# No top-level `namespace:` — the HelmRelease/secret/Ingress run in `core`, but
# the CNPG Database CR lives in `database`; each resource carries its own
# metadata.namespace (same pattern as dependency-track).
resources:
  - database.yaml
  - externalsecret-db.yaml
  - externalsecret-github.yaml
  - helmrelease.yaml
  - ingress.yaml
