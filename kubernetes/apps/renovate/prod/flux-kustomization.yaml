---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prod-renovate
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps/renovate/base
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
  wait: true
  # Needs external-secrets (OCI Vault) up first for the GitHub token.
  dependsOn:
    - name: infrastructure-services
