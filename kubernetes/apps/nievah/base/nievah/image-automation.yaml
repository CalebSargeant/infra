---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: nievah
  namespace: flux-system
spec:
  image: ghcr.io/magmamoose/nievah
  interval: 5m
  provider: generic
  secretRef:
    name: ghcr-pull-secret
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: nievah
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: nievah
  filterTags:
    pattern: '^v[0-9]+\.[0-9]+\.[0-9]+$'
    extract: '$0'
  policy:
    semver:
      range: '>=0.1.0'
---
# Flux rewrites the tag in the nievah repo's k8s/overlays/prod/
# kustomization.yaml against the `$imagepolicy` marker and pushes the bump
# back to that repo's main branch.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: nievah
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: nievah
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: actions@users.noreply.github.com
        name: fluxcdbot
      messageTemplate: |-
        chore: update nievah image
        {{range .Changed.Changes}}{{print .OldValue}} -> {{println .NewValue}}{{end}}

        [ci skip]
    push:
      branch: main
  update:
    path: "./k8s/overlays/prod"
    strategy: Setters
