---
# Exists only so external-dns publishes the CNAME (the `target` annotation) and
# cert-manager mints the cert. Actual request routing is the cloudflared tunnel
# (terraform/cloudflare/zero-trust/prod/tunnels.tf), which connects straight to
# the Service and bypasses Traefik.
#
# Host on sargeant.co (not the magmamoose.com dev-tooling convention) because
# magmamoose.com is on Tucows clientHold and does not resolve — switch when the
# hold lifts.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sonarqube
  namespace: security
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-dns
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/target: 7694eb38-c35e-4905-bd2b-16ab7053080a.cfargotunnel.com
    traefik.ingress.kubernetes.io/service.serversscheme: http
    traefik.ingress.kubernetes.io/entrypoints: websecure
  labels:
    app: sonarqube
spec:
  rules:
    - host: sonarqube.sargeant.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sonarqube-sonarqube
                port:
                  number: 9000
  tls:
    - hosts:
        - sonarqube.sargeant.co
      secretName: sonarqube-tls
