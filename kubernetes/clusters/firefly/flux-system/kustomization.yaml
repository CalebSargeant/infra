apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gotk-components.yaml
  - gotk-sync.yaml
  - kustomizations.yaml
  - helmrepositories.yaml
  - ghcr-pull-secret.yaml
  - github-app-secret.yaml
  - github-app-magmamoose-secret.yaml
  - notifications.yaml
  # Per-app plumbing (GitRepository sources, image automation, namespaces, and
  # the per-app Flux Kustomizations) moved to apps/<app>/. The `networking`
  # namespace moved to infrastructure/configs/namespaces/. This file now holds
  # only genuine cluster-level plumbing: Flux core, the root sync, shared
  # Helm repos / auth secrets, notifications, and the meta `apps` Kustomization.
components:
  - ../../../components/node-selectors/pi
# Note: Removed t.nano resource profile - flux controllers need more resources
# source-controller needs ~300Mi, kustomize-controller needs ~250Mi
# Using default flux resources from gotk-components.yaml
