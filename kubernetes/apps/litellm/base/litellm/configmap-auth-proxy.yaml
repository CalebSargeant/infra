apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-auth-proxy
  namespace: automation
data:
  # Header-translation reverse proxy that sits in front of LiteLLM on the
  # ingress path only. OpenAI-protocol clients (Warp, Codex, OpenCode, the
  # OpenAI SDK) can only send their key in `Authorization: Bearer <key>`, but
  # this gateway is configured for Claude Max OAuth pass-through
  # (`litellm_key_header_name: x-litellm-api-key`) and therefore expects the
  # gateway key in `x-litellm-api-key` instead. We copy Authorization across
  # verbatim ("Bearer <key>" is exactly what x-litellm-api-key wants).
  #
  # diatreme bypasses this proxy entirely — it reaches LiteLLM in-cluster on
  # :4000 with its own header scheme (OAuth in Authorization, gateway key in
  # x-litellm-api-key), so the subscription pass-through is unaffected.
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 1024; }
    http {
      map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
      }
      # Prefer a client-supplied x-litellm-api-key; fall back to Authorization
      # only when the key header is absent.  This handles two distinct callers:
      #   1. OpenAI-protocol clients (Warp, Codex, OpenCode, the OpenAI SDK)
      #      which can only send their key in `Authorization: ******` and
      #      send no `x-litellm-api-key` → we copy Authorization across.
      #   2. The LiteLLM admin UI, which reads `auth_header_name` from its login
      #      JWT, learns that the key header is `x-litellm-api-key`, and then
      #      sends every request with `x-litellm-api-key: <key>` and NO
      #      Authorization.  The old unconditional copy destroyed that key header.
      map $http_x_litellm_api_key $litellm_api_key {
        ""      $http_authorization;       # absent → fall back to Authorization
        default $http_x_litellm_api_key;  # present → preserve it
      }
      server {
        listen 8080;
        client_max_body_size 0;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        location / {
          proxy_pass http://127.0.0.1:4000;
          proxy_http_version 1.1;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Upgrade           $http_upgrade;
          proxy_set_header Connection        $connection_upgrade;
          proxy_set_header x-litellm-api-key $litellm_api_key;
        }
      }
    }
