apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sonarqube-db
  namespace: security
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: sonarqube-db
    creationPolicy: Owner
    template:
      # The chart reads the DB password from key `password`
      # (jdbcOverwrite.jdbcSecretPasswordKey). `username` is kept for parity.
      type: kubernetes.io/basic-auth
      data:
        username: neondb_owner
        password: "{{ .password }}"
  data:
    # Same source of truth CNPG enforces on the `neondb_owner` role.
    - secretKey: password
      remoteRef:
        key: neondb-owner-password
