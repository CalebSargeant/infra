---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prod-flagger
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps/flagger/base
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
  wait: true
  # Needs Prometheus (observability) reachable at runtime; order after core infra.
  dependsOn:
    - name: infrastructure-services
