apiVersion: v1
kind: Service
metadata:
  name: hermes
  namespace: automation
spec:
  selector:
    app: hermes
  ports:
    # Web dashboard (Control UI) — fronted by the ingress.
    - name: dashboard
      protocol: TCP
      port: 9119
      targetPort: 9119
    # OpenAI-compatible API server + health endpoint.
    - name: api
      protocol: TCP
      port: 8642
      targetPort: 8642
  type: ClusterIP
