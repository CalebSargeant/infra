---
# Empty database on the SHARED CNPG cluster (COMMON_MISTAKES #3: do NOT create a
# new Cluster). Backstage runs its own knex migrations on first boot, so it only
# needs an empty database it owns. Owned by the shared `neondb_owner` role
# (password enforced by CNPG from OCI Vault `neondb-owner-password`, surfaced to
# Backstage via externalsecret-db.yaml).
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: backstage
  namespace: database
spec:
  cluster:
    name: postgres
  name: backstage
  owner: neondb_owner
  databaseReclaimPolicy: retain
