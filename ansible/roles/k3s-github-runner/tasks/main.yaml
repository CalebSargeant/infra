---
- name: Fetch GitHub Runner Registration Token
  uri:
    url: "https://api.github.com/repos/{{ github_repo }}/actions/runners/registration-token"
    method: POST
    headers:
      Authorization: "token {{ github_token }}"
      Accept: "application/vnd.github.v3+json"
    return_content: yes
  register: runner_token_response

- name: Parse Runner Token
  set_fact:
    runner_token: "{{ runner_token_response.json.token }}"

- name: Ensure Kubernetes Namespace for GitHub Runners
  kubernetes.core.k8s:
    state: present
    definition:
      kind: Namespace
      apiVersion: v1
      metadata:
        name: "{{ namespace }}"

- name: Deploy GitHub Runner to K3s
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: "{{ runner_name }}"
        namespace: "{{ namespace }}"
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: "{{ runner_name }}"
        template:
          metadata:
            labels:
              app: "{{ runner_name }}"
          spec:
            # The base runner image ships no `dotnet`, so GitVersion — pulled in by
            # gittools/actions/gitversion/setup during Diatreme releases — dies with
            # "Unable to locate executable file: dotnet". Stage the .NET SDK out of
            # Microsoft's official multi-arch (amd64+arm64) image into a shared volume
            # at pod startup; the runner finds it via DOTNET_ROOT + PATH below. The SDK
            # is glibc-based, matching the Ubuntu-based runner image.
            initContainers:
            - name: install-dotnet
              image: mcr.microsoft.com/dotnet/sdk:8.0
              command: ["sh", "-c", "cp -a /usr/share/dotnet/. /opt/dotnet/"]
              volumeMounts:
              - mountPath: /opt/dotnet
                name: dotnet
            containers:
            - name: runner
              image: "{{ runner_image }}"
              env:
              - name: RUNNER_NAME
                value: "{{ runner_name }}"
              - name: RUNNER_REPO
                value: "{{ github_repo }}"
              - name: RUNNER_TOKEN
                value: "{{ runner_token }}"
              - name: RUNNER_LABELS
                value: "{{ runner_labels }}"
              - name: ORG_RUNNER
                value: "false" # Set to true for organisation-level runners
              # .NET SDK staged by the install-dotnet initContainer. k8s REPLACES the
              # image's PATH rather than appending, so this must also list the standard
              # dirs the runner needs, with /opt/dotnet first so `dotnet` resolves.
              - name: DOTNET_ROOT
                value: /opt/dotnet
              - name: DOTNET_CLI_TELEMETRY_OPTOUT
                value: "1"
              - name: DOTNET_NOLOGO
                value: "1"
              - name: PATH
                value: /opt/dotnet:/opt/dotnet/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              volumeMounts:
              - mountPath: /data
                name: runner-data
              - mountPath: /opt/dotnet
                name: dotnet
              securityContext:
                runAsUser: 1000
                runAsGroup: 1000
            volumes:
            - name: runner-data
              emptyDir: {}
            - name: dotnet
              emptyDir: {}
