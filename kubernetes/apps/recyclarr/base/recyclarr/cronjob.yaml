apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr
  namespace: media
spec:
  schedule: "0 4 * * *" # daily 04:00 — reconcile Sonarr + Radarr quality from TRaSH
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          nodeSelector:
            topology.sargeant.co/tier: native-cloud
          containers:
            - name: recyclarr
              # Pinned to v7: v8 removed TRaSH `include: template:` support.
              image: ghcr.io/recyclarr/recyclarr:7.5.2
              args: ["sync"]
              env:
                - name: SONARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: recyclarr-secrets
                      key: SONARR_API_KEY
                - name: RADARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: recyclarr-secrets
                      key: RADARR_API_KEY
              volumeMounts:
                # writable data dir — recyclarr clones the TRaSH repos here
                - name: data
                  mountPath: /config
                - name: config
                  mountPath: /config/recyclarr.yml
                  subPath: recyclarr.yml
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  memory: 256Mi
          volumes:
            - name: data
              emptyDir: {}
            - name: config
              configMap:
                name: recyclarr-config
