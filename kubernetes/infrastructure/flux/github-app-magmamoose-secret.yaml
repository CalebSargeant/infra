# release-runner GitHub App — MagmaMoose org installation (129204149).
#
# The magmamoose/* products live in the MagmaMoose org. The shared SOPS secret
# buxfer-sync-github-app is scoped to the release-runner App's CalebSargeant
# installation (90490962), and a GitHub App token only works for the one
# installation it was minted for — so Flux image-automation couldn't push tag
# bumps to magmamoose/* repos ("denied to release-runner[bot]").
#
# This ExternalSecret projects the *same* App's private key (from OCI Vault,
# secret release-runner-github-app-private-key) together with the MagmaMoose
# installation id, producing a github-app-magmamoose Secret that the
# magmamoose/* GitRepositories (diatreme-pro, zoey — under
# apps/<app>/base/<app>/gitrepository.yaml) authenticate with. The App id and
# installation id aren't secret, so they're kept inline for clarity.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-app-magmamoose
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: github-app-magmamoose
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        githubAppID: "2134967"
        githubAppInstallationID: "129204149"
        githubAppPrivateKey: "{{ .privateKey }}"
  data:
    - secretKey: privateKey
      remoteRef:
        key: release-runner-github-app-private-key
