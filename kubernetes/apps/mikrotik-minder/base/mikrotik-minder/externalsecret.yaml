# Pulls the agent's bearer token + per-device credentials from OCI Vault.
#
# The OCI Vault secret `mikrotik-minder-agent` must contain at least:
#   - agent_token         (mtm_… from POST /v1/admin/agents on the hosted worker)
#   - backup_password     (long random; encrypts /system backup save artifacts)
#   - oci_rtr_01_password (test-device password)
#
# These keys land in the in-cluster Secret as the env-var names referenced by
# the agent's YAML config (MTM_AGENT_TOKEN, MTM_BACKUP_PASSWORD, OCI_RTR_01_PASSWORD).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mikrotik-minder-agent-env
  namespace: automation
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: mikrotik-minder-agent-env
    creationPolicy: Owner
  data:
    - secretKey: MTM_AGENT_TOKEN
      remoteRef:
        key: mikrotik-minder-agent
        property: agent_token
    - secretKey: MTM_BACKUP_PASSWORD
      remoteRef:
        key: mikrotik-minder-agent
        property: backup_password
    - secretKey: OCI_RTR_01_PASSWORD
      remoteRef:
        key: mikrotik-minder-agent
        property: oci_rtr_01_password
